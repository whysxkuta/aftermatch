<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Сетка турнира — aftermatch.ru</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
  <style>
    .bracket-board{display:flex;gap:44px;align-items:flex-start;overflow:auto;padding:6px 0 14px}
    .bracket-round{min-width:188px;display:flex;flex-direction:column}
    .bracket-round-title{text-align:center;font-weight:800;margin-bottom:14px}
    .bracket-stack{display:flex;flex-direction:column;gap:18px}
    .bracket-match{position:relative;display:block;text-decoration:none;color:#fff;border:1px solid rgba(255,255,255,.08);border-radius:14px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));overflow:hidden;transition:.15s ease;cursor:default}
    .bracket-match.clickable{cursor:pointer}
    .bracket-match.clickable:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.16)}
    .bracket-match.live{border-color:rgba(255,145,0,.65);box-shadow:0 0 0 1px rgba(255,145,0,.18),0 10px 30px rgba(255,145,0,.12)}
    .bracket-team-row{display:grid;grid-template-columns:minmax(0,1fr) 34px;gap:8px;align-items:center;padding:12px 12px}
    .bracket-team-row + .bracket-team-row{border-top:1px solid rgba(255,255,255,.06)}
    .bracket-team-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bracket-score{justify-self:end;font-weight:900}
    .bracket-score.win{color:#55d87d}.bracket-score.lose{color:#ff6b6b}
    .bracket-team-row.empty .bracket-team-name,.bracket-team-row.empty .bracket-score{color:#c7d0ea;opacity:.85}
    .msk-note{margin-top:10px;color:#b7c0da;font-size:12px}
  </style>
</head>
<body>
  <div class="topbar"><div class="topbar-inner"><div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div><div class="nav"></div></div></div>
  <div class="container">
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <div>
          <div class="small">Турнир</div>
          <h1 id="title" style="margin:6px 0 0;">Сетка</h1>
          <div class="msk-note">Всё время указано в МСК</div>
        </div>
        <a class="nav-btn-link" id="backLink" href="#">Назад</a>
      </div>
    </div>
    <div style="height:14px"></div>
    <div id="content" class="card">Загрузка...</div>
  </div>
<script>
const id = new URLSearchParams(location.search).get("id");
document.getElementById("backLink").href = `/tournament.html?id=${encodeURIComponent(id)}`;
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function num(v){ return v === null || v === undefined || v === '' ? '' : String(v); }
function scoreClass(match, side){
  if (match.score_a === null || match.score_b === null || match.score_a === '' || match.score_b === '') return '';
  const a = Number(match.score_a), b = Number(match.score_b);
  if (Number.isNaN(a) || Number.isNaN(b)) return '';
  if (side === 'A') return a > b ? 'win' : a < b ? 'lose' : '';
  return b > a ? 'win' : b < a ? 'lose' : '';
}
function roundsTitle(round, total){ return round === total ? 'Финал' : `Раунд ${round}`; }
function teamRow(name, score, cls, empty){
  return `<div class="bracket-team-row ${empty ? 'empty' : ''}"><div class="bracket-team-name">${esc(name || 'TBD')}</div><div class="bracket-score ${cls}">${esc(score)}</div></div>`;
}
function renderRound(roundMatches, round, totalRounds){
  return `<div class="bracket-round"><div class="bracket-round-title">${roundsTitle(round, totalRounds)}</div><div class="bracket-stack">${roundMatches.map(m => {
    const href = m.match_id ? `/match-room.html?id=${encodeURIComponent(m.match_id)}` : '#';
    const cardCls = `bracket-match ${m.match_id ? 'clickable' : ''} ${m.is_live ? 'live' : ''}`;
    return `<a class="${cardCls}" href="${href}" ${m.match_id ? '' : 'onclick="return false"'} title="${m.match_id ? 'Открыть комнату матча' : 'Матч ещё не создан'}">${teamRow(m.teamA?.name || 'TBD', num(m.score_a), scoreClass(m,'A'), !m.teamA)}${teamRow(m.teamB?.name || 'TBD', num(m.score_b), scoreClass(m,'B'), !m.teamB)}</a>`;
  }).join('')}</div></div>`;
}
async function load(){
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}`, { credentials:'include' });
  const data = await res.json().catch(()=>null);
  if (!res.ok || !data){ document.getElementById('content').textContent = data?.error || 'Сетка недоступна'; return; }
  document.getElementById('title').textContent = data.name || 'Сетка';
  const matches = Array.isArray(data.bracket_matches) ? data.bracket_matches : [];
  if (!matches.length){ document.getElementById('content').textContent = 'Сетка ещё не создана.'; return; }
  const byRound = new Map();
  for (const m of matches){ if (!byRound.has(m.round_number)) byRound.set(m.round_number, []); byRound.get(m.round_number).push(m); }
  const rounds = Array.from(byRound.keys()).sort((a,b)=>a-b);
  rounds.forEach(r => byRound.get(r).sort((a,b)=>a.slot_number - b.slot_number));
  document.getElementById('content').innerHTML = `<div class="bracket-board">${rounds.map(r => renderRound(byRound.get(r), r, rounds[rounds.length-1])).join('')}</div>`;
}
load();
</script>
</body></html>
