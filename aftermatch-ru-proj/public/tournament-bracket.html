<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Сетка турнира — aftermatch.ru</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar"><div class="topbar-inner"><div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div><div class="nav"></div></div></div>
  <div class="container">
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
        <div>
          <div class="small">Турнир</div>
          <h1 id="title" style="margin:6px 0 0;">Сетка</h1>
        </div>
        <a class="nav-btn-link" id="backLink" href="#">Назад</a>
      </div>
    </div>
    <div style="height:14px"></div>
    <div id="content" class="card">Загрузка...</div>
  </div>
<script>
const id = new URLSearchParams(location.search).get("id");
document.getElementById("backLink").href = `/tournament.html?id=${encodeURIComponent(id)}`;
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(v){
  if(!v) return "—";
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return esc(v);
  return d.toLocaleString("ru-RU", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}

let bracketData = null;

function teamLabel(team) {
  if (!team) return "TBD";
  return `${team.tag ? "[" + esc(team.tag) + "] " : ""}${esc(team.name)}`;
}

function buildColumns(matches, size) {
  const rounds = Math.max(...matches.map(m => Number(m.round_number || 0)), Math.log2(Number(size || 0) || 1));
  const columns = [];
  for (let round = 1; round <= rounds; round++) {
    const colMatches = matches.filter(m => Number(m.round_number) === round).sort((a,b) => Number(a.slot_number) - Number(b.slot_number));
    columns.push({
      title: round === rounds ? "Финал" : `Раунд ${round}`,
      matches: colMatches
    });
  }
  return columns;
}

function teamOptions(selectedId) {
  const teams = Array.isArray(bracketData?.teams) ? bracketData.teams : [];
  return ['<option value="">TBD</option>'].concat(teams.map(t => {
    const label = `${t.tag ? '[' + esc(t.tag) + '] ' : ''}${esc(t.name)}`;
    return `<option value="${t.id}" ${selectedId === t.id ? 'selected' : ''}>${label}</option>`;
  })).join('');
}

function matchCard(match, isAdmin) {
  const roomHref = match.match_id ? `/match-room.html?id=${encodeURIComponent(match.match_id)}` : null;
  const matchHref = match.match_id ? `/match.html?matchId=${encodeURIComponent(match.match_id)}` : null;
  return `
    <div class="vb-match" style="display:flex;flex-direction:column;gap:8px;">
      <div class="vb-team">${teamLabel(match.teamA)} <span>${match.score_a ?? ""}</span></div>
      <div class="vb-team">${teamLabel(match.teamB)} <span>${match.score_b ?? ""}</span></div>
      <div class="small">Матч ${Number(match.slot_number || 0)} • ${fmt(match.scheduled_at)}</div>
      ${match.match_id ? `<div class="small">ID матча: ${esc(match.match_id)}</div>` : `<div class="small">Матч ещё не создан</div>`}
      <div class="row" style="gap:8px;flex-wrap:wrap;">
        ${matchHref ? `<a class="btn" href="${matchHref}">Veto</a>` : ``}
        ${roomHref && match.room_available ? `<a class="btn primary" href="${roomHref}">Комната матча</a>` : ``}
      </div>
      ${isAdmin ? `
        <div class="small" style="margin-top:4px;">Назначение команд</div>
        <select data-team-a="${match.id}">${teamOptions(match.team_a_id)}</select>
        <select data-team-b="${match.id}">${teamOptions(match.team_b_id)}</select>
        <button class="btn" onclick="saveTeams('${match.id}')">Сохранить участников</button>
      ` : ``}
    </div>
  `;
}

function renderLiveBracket(data) {
  const columns = buildColumns(data.bracket_matches || [], data.size || 0);
  return `
    ${data.is_admin ? `<div class="small" style="margin-bottom:14px;">Админ-режим: можно указать, какие команды участвуют в каждом матче. После сохранения для матча автоматически создаётся/обновляется запись и становится доступен Veto.</div>` : ``}
    <div class="visual-bracket">${columns.map(col => `
      <div class="vb-col">
        <div class="vb-title">${esc(col.title)}</div>
        ${col.matches.length ? col.matches.map(m => matchCard(m, !!data.is_admin)).join("") : `<div class="small">Нет матчей</div>`}
      </div>
    `).join("")}</div>
  `;
}

function renderLegacyBracket(bracket) {
  function renderCols(columns) {
    return `<div class="visual-bracket">${columns.map(col => `
      <div class="vb-col">
        <div class="vb-title">${esc(col.title)}</div>
        ${col.matches.map(m => `
          <div class="vb-match">
            <div class="vb-team">${esc(m.teamA || "TBD")} <span>${esc(m.scoreA || "")}</span></div>
            <div class="vb-team">${esc(m.teamB || "TBD")} <span>${esc(m.scoreB || "")}</span></div>
          </div>
        `).join("")}
      </div>
    `).join("")}</div>`;
  }
  if (bracket.type === "single") return renderCols(bracket.columns || []);
  return `
    <div class="small" style="margin-bottom:10px;">Double Elimination • ${bracket.size} команд</div>
    ${(bracket.sections || []).map(section => `
      <div style="margin-bottom:18px;">
        <h3 style="margin:0 0 10px;">${esc(section.title)}</h3>
        ${renderCols(section.columns || [])}
      </div>
    `).join("")}
  `;
}

async function saveTeams(matchId) {
  const a = document.querySelector(`[data-team-a="${matchId}"]`);
  const b = document.querySelector(`[data-team-b="${matchId}"]`);
  const payload = {
    team_a_id: a ? (a.value || null) : null,
    team_b_id: b ? (b.value || null) : null
  };
  if (payload.team_a_id && payload.team_a_id === payload.team_b_id) {
    if (window.showToast) showToast("Нельзя поставить одну и ту же команду в обе стороны");
    else alert("Нельзя поставить одну и ту же команду в обе стороны");
    return;
  }
  const res = await fetch(`/api/bracket-matches/${encodeURIComponent(matchId)}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    if (window.showToast) showToast((data && data.error) ? data.error : "Не удалось сохранить");
    else alert((data && data.error) ? data.error : "Не удалось сохранить");
    return;
  }
  if (window.showToast) showToast("Участники матча обновлены", "success");
  load();
}
window.saveTeams = saveTeams;

async function load() {
  const metaRes = await fetch(`/api/tournaments/${encodeURIComponent(id)}`, { credentials:"include" });
  const meta = await metaRes.json().catch(()=>null);
  if (meta && meta.name) document.getElementById("title").textContent = meta.name;

  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}/visual-bracket`, { credentials:"include" });
  const data = await res.json().catch(()=>null);
  if (!res.ok || !data) {
    document.getElementById("content").textContent = (data && data.error) ? data.error : "Сетка недоступна";
    return;
  }
  bracketData = data;

  if (Array.isArray(data.bracket_matches) && data.bracket_matches.length) {
    document.getElementById("content").innerHTML = renderLiveBracket(data);
    return;
  }

  const bracket = data.bracket;
  if (!bracket) {
    document.getElementById("content").textContent = "Сетка ещё не создана.";
    return;
  }

  document.getElementById("content").innerHTML = renderLegacyBracket(bracket);
}
load();
</script>
</body></html>
