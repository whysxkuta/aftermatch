<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Комната матча — aftermatch.ru</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div>
      <div class="nav"></div>
    </div>
  </div>

  <div class="container match-room-page">
    <div id="roomShell" class="match-room-faceit-shell">
      <div class="card">Загрузка...</div>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id") || params.get("matchId");
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(v){
  if(!v) return "—";
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return esc(v);
  return d.toLocaleString("ru-RU", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}
function statusLabel(status){
  const map = {
    veto: 'Veto',
    ready: 'Готово к игре',
    finished: 'Завершён',
    pending: 'Ожидание'
  };
  return map[status] || status || 'Матч';
}
function avatar(url, name){
  return url ? esc(url) : `https://ui-avatars.com/api/?name=${encodeURIComponent(name || '?')}&background=111827&color=ffffff&bold=true`;
}
function playerCard(player){
  return `
    <div class="faceit-player-card ${player.role === 'captain' ? 'captain' : ''}">
      <img class="faceit-player-avatar" src="${avatar(player.avatar_url, player.nickname)}" alt="${esc(player.nickname)}">
      <div class="faceit-player-meta">
        <div class="faceit-player-top">
          <span class="faceit-player-name">${esc(player.nickname)}</span>
          ${player.role === 'captain' ? '<span class="faceit-role-badge">CAP</span>' : ''}
        </div>
        <div class="faceit-player-sub">${player.steam_profile_name ? esc(player.steam_profile_name) : 'Игрок команды'} ${player.online ? '• online' : ''}</div>
      </div>
    </div>
  `;
}
function vetoActionText(action, data){
  const teamName = action.by === 'A' ? data.teamA.name : data.teamB.name;
  const verb = action.type === 'ban' ? 'забанила' : 'пикнула';
  return `${teamName} ${verb} ${action.map}`;
}
let loading = false;

async function loadRoom() {
  if (!id || loading) return;
  loading = true;
  try {
    const res = await fetch(`/api/matches/${encodeURIComponent(id)}/room`, { credentials: "include" });
    const data = await res.json().catch(()=>null);
    if (!res.ok || !data) {
      document.getElementById("roomShell").innerHTML = `<div class="card">${esc((data && data.error) ? data.error : 'Ошибка загрузки')}</div>`;
      return;
    }

    document.title = `${data.teamA.name} vs ${data.teamB.name} — Комната матча`;

    const veto = data.veto || {};
    const step = veto.steps && veto.steps[veto.stepIndex] ? veto.steps[veto.stepIndex] : null;
    const actions = Array.isArray(veto.actions) ? veto.actions : [];
    const currentMap = (data.maps && data.maps[0]) || veto.decider || 'Карта ещё не определена';
    const leftScore = data.score && data.score.a !== null ? data.score.a : '—';
    const rightScore = data.score && data.score.b !== null ? data.score.b : '—';
    const winnerSide = data.winnerSide || null;
    const roomStateClass = data.status === 'finished' ? 'finished' : (data.status === 'ready' ? 'ready' : 'live');
    const yourTurn = step && data.mySide && step.by === data.mySide;

    const deadline = veto.turn_deadline_at ? new Date(veto.turn_deadline_at).getTime() : null;
    const timerHtml = deadline ? `<span id="turnTimer" data-deadline="${deadline}">—</span>` : '—';

    document.getElementById("roomShell").innerHTML = `
      <section class="match-faceit-board card">
        <div class="match-faceit-head">
          <div class="match-faceit-team match-faceit-team-left ${winnerSide === 'A' ? 'winner' : ''}">
            <div class="match-faceit-team-row left">
              <div class="match-faceit-team-text">
                <div class="match-faceit-team-name">${esc(data.teamA.name)}</div>
                <div class="match-faceit-team-note">${esc(data.captains?.A || 'Без капитана')}</div>
              </div>
              <img class="match-faceit-logo" src="${avatar(data.teamA.avatar_url, data.teamA.name)}" alt="${esc(data.teamA.name)}">
            </div>
          </div>

          <div class="match-faceit-score-block">
            <div class="match-faceit-series">${esc(data.tournament.mode)} • BO${esc(data.tournament.bo)}</div>
            <div class="match-faceit-status">${esc(statusLabel(data.status))}</div>
            <div class="match-faceit-score-line">
              <div class="match-faceit-score ${winnerSide === 'A' ? 'is-winner' : ''}">${leftScore}</div>
              <div class="match-faceit-score-divider"></div>
              <div class="match-faceit-score ${winnerSide === 'B' ? 'is-winner' : ''}">${rightScore}</div>
            </div>
            <div class="match-faceit-meta">${esc(data.tournament.name)} • ${fmt(data.scheduledAt)}</div>
          </div>

          <div class="match-faceit-team match-faceit-team-right ${winnerSide === 'B' ? 'winner' : ''}">
            <div class="match-faceit-team-row right">
              <img class="match-faceit-logo" src="${avatar(data.teamB.avatar_url, data.teamB.name)}" alt="${esc(data.teamB.name)}">
              <div class="match-faceit-team-text right">
                <div class="match-faceit-team-name">${esc(data.teamB.name)}</div>
                <div class="match-faceit-team-note">${esc(data.captains?.B || 'Без капитана')}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="match-faceit-body ${roomStateClass}">
          <aside class="faceit-roster-panel">
            <div class="faceit-roster-title">${esc(data.teamA.name)}</div>
            <div class="faceit-roster-list">${(data.teamAPlayers || []).map(playerCard).join('') || '<div class="small">Нет игроков</div>'}</div>
          </aside>

          <main class="faceit-center-panel">
            <div class="faceit-center-topline">
              <span class="faceit-center-label">Map</span>
              <span class="faceit-center-label">${step ? 'Veto' : 'Матч'}</span>
            </div>

            <div class="faceit-map-card">
              <div class="faceit-map-title">${esc(currentMap)}</div>
              <div class="faceit-map-sub">${step ? `Сейчас ходит ${esc(step.by === 'A' ? data.teamA.name : data.teamB.name)} • ${step.type === 'ban' ? 'бан карты' : 'пик карты'}` : 'Veto завершён'}</div>
            </div>

            <div class="faceit-center-info">
              <div class="faceit-info-row"><span>Статус</span><b>${esc(statusLabel(data.status))}</b></div>
              <div class="faceit-info-row"><span>Таймер хода</span><b>${timerHtml}</b></div>
              <div class="faceit-info-row"><span>Ваш доступ</span><b>${data.isAdmin ? 'Администратор' : (data.mySide ? `Капитан команды ${data.mySide}` : 'Только просмотр')}</b></div>
            </div>

            <div class="faceit-veto-grid-wrap">
              <div id="mapsGrid" class="faceit-veto-grid">
                ${(Array.isArray(data.tournament.mapPool) ? data.tournament.mapPool : []).map(map => {
                  const remaining = Array.isArray(veto.remaining) ? veto.remaining : [];
                  const usedMaps = new Set(actions.map(a => a.map));
                  const disabled = !step || data.isAdmin || data.mySide !== veto.current_turn || step.by !== data.mySide || !remaining.includes(map);
                  const stateClass = usedMaps.has(map) ? 'used' : (remaining.includes(map) ? 'active' : 'locked');
                  return `<button class="faceit-map-button ${stateClass} ${yourTurn && remaining.includes(map) ? 'turn' : ''}" ${disabled ? 'disabled' : ''} onclick="doVeto('${map.replace(/'/g, "&#39;")}')">${esc(map)}</button>`;
                }).join('')}
              </div>
            </div>

            <div class="faceit-center-actions">
              ${data.connect ? `<button class="btn primary faceit-main-action" onclick="copyConnect('${esc(data.connect)}')">Скопировать connect</button>` : ''}
              <button class="btn faceit-sub-action" onclick="location.href='/tournament.html?id=${encodeURIComponent(data.tournament.id)}'">Назад к турниру</button>
              <button class="btn faceit-sub-action" onclick="toggleExtra()">${data.status === 'finished' ? 'Показать детали матча' : 'Показать сервер и лог veto'}</button>
            </div>

            <div id="extraPanel" class="faceit-extra-panel hidden">
              <div class="faceit-server-box">
                <div><b>Сервер:</b> ${esc(data.serverIp || 'Пока не назначен')}</div>
                <div><b>Пароль:</b> ${esc(data.serverPassword || '—')}</div>
                <div><b>Карты серии:</b> ${(data.maps && data.maps.length) ? data.maps.map(esc).join(', ') : '—'}</div>
              </div>
              <div class="faceit-log-box">
                ${(actions.length ? actions.map(a => `<div class="faceit-log-row">${esc(vetoActionText(a, data))}</div>`).join('') : '<div class="small">Пока нет действий veto</div>')}
              </div>
            </div>
          </main>

          <aside class="faceit-roster-panel">
            <div class="faceit-roster-title align-right">${esc(data.teamB.name)}</div>
            <div class="faceit-roster-list">${(data.teamBPlayers || []).map(playerCard).join('') || '<div class="small">Нет игроков</div>'}</div>
          </aside>
        </div>
      </section>
    `;

    startTurnTimer();
  } finally {
    loading = false;
  }
}

function startTurnTimer() {
  const el = document.getElementById('turnTimer');
  if (!el) return;
  const update = () => {
    const deadline = Number(el.dataset.deadline || 0);
    if (!deadline) { el.textContent = '—'; return; }
    const left = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
    el.textContent = `${left} сек`;
  };
  update();
  clearInterval(window.__roomTimer);
  window.__roomTimer = setInterval(update, 1000);
}

async function doVeto(map) {
  const res = await fetch(`/api/matches/${encodeURIComponent(id)}/veto-action`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ map })
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) {
    if (window.showToast) showToast((data && data.error) ? data.error : "Ошибка");
    else alert((data && data.error) ? data.error : "Ошибка");
    return;
  }
  loadRoom();
}

function copyConnect(text) {
  navigator.clipboard.writeText(text || "");
  if (window.showToast) showToast("Команда подключения скопирована", "success");
}

function toggleExtra() {
  const box = document.getElementById('extraPanel');
  if (box) box.classList.toggle('hidden');
}

loadRoom();
setInterval(loadRoom, 3500);
</script>
</body>
</html>
