<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Комната матча — aftermatch.ru</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div>
      <div class="nav"></div>
    </div>
  </div>

  <div class="container match-room-page">
    <div id="roomShell" class="match-room-faceit-shell">
      <div class="card">Загрузка...</div>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id") || params.get("matchId");
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(v){
  if(!v) return "—";
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return esc(v);
  return d.toLocaleString("ru-RU", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}
function statusLabel(status){
  const map = {
    veto: 'Ожидание хода',
    ready: 'Готово к игре',
    finished: 'Завершён',
    pending: 'Ожидание'
  };
  return map[status] || status || 'Матч';
}
function avatar(url, name){
  return url ? esc(url) : `https://ui-avatars.com/api/?name=${encodeURIComponent(name || '?')}&background=111827&color=ffffff&bold=true`;
}
function displayMapName(map){
  const names = {
    de_mirage: 'Mirage',
    de_inferno: 'Inferno',
    de_nuke: 'Nuke',
    de_ancient: 'Ancient',
    de_anubis: 'Anubis',
    de_vertigo: 'Vertigo',
    de_dust2: 'Dust II'
  };
  return names[map] || (map ? map.replace(/^de_/i, '').replace(/_/g, ' ').replace(/\w/g, c => c.toUpperCase()) : '—');
}
function mapPalette(map){
  const palettes = {
    de_mirage: ['#9a6236','#3e2417','#d4a373'],
    de_inferno: ['#b94f29','#35140d','#f08b53'],
    de_nuke: ['#6b7fa3','#161f31','#b6c7ff'],
    de_ancient: ['#507b49','#132615','#9dd287'],
    de_anubis: ['#9e7a49','#2a2117','#d7b16a'],
    de_vertigo: ['#5c6d84','#1d232d','#aab8cc'],
    de_dust2: ['#ad8156','#332111','#e1b98a']
  };
  return palettes[map] || ['#6a4c93','#20142d','#b79cff'];
}
function mapBackground(map){
  const [a,b,c] = mapPalette(map);
  const title = displayMapName(map || 'map').toUpperCase();
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="${a}"/>
          <stop offset="55%" stop-color="${b}"/>
          <stop offset="100%" stop-color="#070b12"/>
        </linearGradient>
        <radialGradient id="glow" cx=".78" cy=".28" r=".7">
          <stop offset="0%" stop-color="${c}" stop-opacity=".65"/>
          <stop offset="100%" stop-color="${c}" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="500" fill="url(#bg)"/>
      <rect width="1200" height="500" fill="url(#glow)"/>
      <g opacity=".26" fill="#fff">
        <path d="M0 420L170 290l64 54 82-71 102 65 138-110 93 76 95-69 136 96 131-91 89 71V500H0z"/>
        <path d="M0 500V356l149-54 82 41 87-73 121 87 87-53 103 81 105-48 114 76 128-77 123 64V500z" opacity=".45"/>
      </g>
      <g opacity=".14" stroke="#fff" stroke-width="2" fill="none">
        <path d="M78 112h228"/>
        <path d="M129 164h390"/>
        <path d="M720 108h310"/>
        <path d="M832 150h232"/>
      </g>
      <text x="60" y="438" fill="rgba(255,255,255,.13)" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900">${title}</text>
    </svg>`;
  return `url("data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}")`;
}
function playerCard(player){
  return `
    <div class="faceit-player-card ${player.role === 'captain' ? 'captain' : ''}">
      <img class="faceit-player-avatar" src="${avatar(player.avatar_url, player.nickname)}" alt="${esc(player.nickname)}">
      <div class="faceit-player-meta">
        <div class="faceit-player-top">
          <span class="faceit-player-name">${esc(player.nickname)}</span>
          ${player.role === 'captain' ? '<span class="faceit-role-badge">CAP</span>' : ''}
        </div>
        <div class="faceit-player-sub">${player.steam_profile_name ? esc(player.steam_profile_name) : 'Игрок команды'} ${player.online ? '• online' : ''}</div>
      </div>
    </div>
  `;
}
function vetoActionText(action, data){
  const teamName = action.by === 'A' ? data.teamA.name : data.teamB.name;
  const verb = action.type === 'ban' ? 'забанила' : 'пикнула';
  return `${teamName} ${verb} ${displayMapName(action.map)}`;
}
function formatClock(seconds){
  const m = Math.floor(seconds / 60).toString().padStart(1, '0');
  const s = Math.max(0, seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}
function buildSeriesCards(data, veto){
  const bo = Number(data.tournament.bo || 1);
  const picksA = veto?.picks?.A || [];
  const picksB = veto?.picks?.B || [];
  const maps = Array.isArray(data.maps) ? data.maps : [];
  if (bo <= 1) {
    const onlyMap = maps[0] || veto?.decider || picksA[0] || picksB[0] || 'de_mirage';
    return `
      <div class="faceit-map-card solo" style="background-image:${mapBackground(onlyMap)};">
        <div class="faceit-map-overlay"></div>
        <div class="faceit-map-title centered">${esc(displayMapName(onlyMap))}</div>
      </div>
    `;
  }
  const slots = [
    { label: `${esc(data.teamA.name)} pick`, map: maps[0] || picksA[0] || null },
    { label: `${esc(data.teamB.name)} pick`, map: maps[1] || picksB[0] || null },
    { label: 'Decider', map: maps[2] || veto?.decider || null }
  ];
  return `
    <div class="faceit-series-grid three">
      ${slots.map((slot, idx) => {
        const map = slot.map || 'de_mirage';
        return `
          <div class="faceit-map-card series-card" style="background-image:${mapBackground(map)};">
            <div class="faceit-map-overlay"></div>
            <div class="faceit-series-chip">Карта ${idx + 1}</div>
            <div class="faceit-map-title centered">${esc(slot.map ? displayMapName(slot.map) : 'Ожидается')}</div>
            <div class="faceit-map-sub centered">${esc(slot.label)}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}
let loading = false;

async function loadRoom() {
  if (!id || loading) return;
  loading = true;
  try {
    const res = await fetch(`/api/matches/${encodeURIComponent(id)}/room`, { credentials: "include" });
    const data = await res.json().catch(()=>null);
    if (!res.ok || !data) {
      document.getElementById("roomShell").innerHTML = `<div class="card">${esc((data && data.error) ? data.error : 'Ошибка загрузки')}</div>`;
      return;
    }

    document.title = `${data.teamA.name} vs ${data.teamB.name} — Комната матча`;

    const veto = data.veto || {};
    const step = veto.steps && veto.steps[veto.stepIndex] ? veto.steps[veto.stepIndex] : null;
    const actions = Array.isArray(veto.actions) ? veto.actions : [];
    const leftScore = data.score && data.score.a !== null ? data.score.a : '—';
    const rightScore = data.score && data.score.b !== null ? data.score.b : '—';
    const winnerSide = data.winnerSide || null;
    const roomStateClass = data.status === 'finished' ? 'finished' : (data.status === 'ready' ? 'ready' : 'live');
    const yourTurn = step && data.mySide && step.by === data.mySide;
    const vetoComplete = !step && ((Array.isArray(data.maps) && data.maps.length) || veto.decider || data.status === 'ready' || data.status === 'finished');
    const deadline = veto.turn_deadline_at ? new Date(veto.turn_deadline_at).getTime() : null;
    const scoreOrTimerHtml = vetoComplete
      ? `<div class="match-faceit-score-line"><div class="match-faceit-score ${winnerSide === 'A' ? 'is-winner' : ''}">${leftScore}</div><div class="match-faceit-score-divider"></div><div class="match-faceit-score ${winnerSide === 'B' ? 'is-winner' : ''}">${rightScore}</div></div>`
      : `<div class="match-faceit-timer-line"><span class="match-faceit-clock-icon">◷</span><span id="turnTimer" data-deadline="${deadline || ''}">0:30</span></div>`;

    document.getElementById("roomShell").innerHTML = `
      <section class="match-faceit-board card">
        <div class="match-faceit-head">
          <div class="match-faceit-team match-faceit-team-left ${winnerSide === 'A' ? 'winner' : ''}">
            <div class="match-faceit-team-row left">
              <div class="match-faceit-team-text">
                <div class="match-faceit-team-name">${esc(data.teamA.tag || data.teamA.name)}</div>
                <div class="match-faceit-team-note">${esc(data.captains?.A || data.teamA.name)}</div>
              </div>
              <img class="match-faceit-logo" src="${avatar(data.teamA.avatar_url, data.teamA.name)}" alt="${esc(data.teamA.name)}">
            </div>
          </div>

          <div class="match-faceit-score-block">
            <div class="match-faceit-series">${esc(data.tournament.mode)} • BO${esc(data.tournament.bo)}</div>
            <div class="match-faceit-status">${esc(statusLabel(data.status))}</div>
            ${scoreOrTimerHtml}
            <div class="match-faceit-meta">${esc(data.tournament.name)} • ${fmt(data.scheduledAt)}</div>
          </div>

          <div class="match-faceit-team match-faceit-team-right ${winnerSide === 'B' ? 'winner' : ''}">
            <div class="match-faceit-team-row right">
              <img class="match-faceit-logo" src="${avatar(data.teamB.avatar_url, data.teamB.name)}" alt="${esc(data.teamB.name)}">
              <div class="match-faceit-team-text right">
                <div class="match-faceit-team-name">${esc(data.teamB.tag || data.teamB.name)}</div>
                <div class="match-faceit-team-note">${esc(data.captains?.B || data.teamB.name)}</div>
              </div>
            </div>
          </div>
        </div>

        <div class="match-faceit-body ${roomStateClass}">
          <aside class="faceit-roster-panel">
            <div class="faceit-roster-title">${esc(data.teamA.tag || data.teamA.name)}</div>
            <div class="faceit-roster-list">${(data.teamAPlayers || []).map(playerCard).join('') || '<div class="small">Нет игроков</div>'}</div>
          </aside>

          <main class="faceit-center-panel">
            <div class="faceit-center-topline">
              <span class="faceit-center-label">Карта</span>
              <span class="faceit-center-label">${step ? 'Veto' : 'Матч'}</span>
            </div>

            ${buildSeriesCards(data, veto)}

            <div class="faceit-veto-list-wrap">
              <div id="mapsGrid" class="faceit-veto-list ${Number(data.tournament.bo || 1) > 1 ? 'compact' : ''}">
                ${(Array.isArray(data.tournament.mapPool) ? data.tournament.mapPool : []).map(map => {
                  const remaining = Array.isArray(veto.remaining) ? veto.remaining : [];
                  const usedMaps = new Set(actions.map(a => a.map));
                  const disabled = !step || data.isAdmin || data.mySide !== veto.current_turn || step.by !== data.mySide || !remaining.includes(map);
                  const stateClass = usedMaps.has(map) ? 'used' : (remaining.includes(map) ? 'active' : 'locked');
                  const caption = usedMaps.has(map)
                    ? (actions.find(a => a.map === map)?.type === 'pick' ? 'Пикнута' : 'Забанена')
                    : (remaining.includes(map) ? (yourTurn ? 'Нажми, чтобы выбрать' : 'Доступна') : 'Недоступна');
                  return `<button class="faceit-map-button ${stateClass} ${yourTurn && remaining.includes(map) ? 'turn' : ''}" style="background-image:${mapBackground(map)};" ${disabled ? 'disabled' : ''} onclick="doVeto('${map.replace(/'/g, "&#39;")}')"><span class="faceit-map-button-bg"></span><span class="faceit-map-button-name">${esc(displayMapName(map))}</span><span class="faceit-map-button-sub">${esc(caption)}</span></button>`;
                }).join('')}
              </div>
            </div>

            <div class="faceit-center-actions">
              ${vetoComplete && data.connect ? `<button class="btn primary faceit-main-action" onclick="copyConnect('${esc(data.connect)}')">Присоединиться</button>` : ''}
              <button class="btn faceit-sub-action" onclick="location.href='/tournament.html?id=${encodeURIComponent(data.tournament.id)}'">Назад к турниру</button>
              <button class="btn faceit-sub-action" onclick="toggleExtra()">История банов</button>
            </div>

            <div id="extraPanel" class="faceit-extra-panel hidden">
              <div class="faceit-log-box">
                ${(actions.length ? actions.map(a => `<div class="faceit-log-row">${esc(vetoActionText(a, data))}</div>`).join('') : '<div class="small">Пока нет действий veto</div>')}
              </div>
            </div>
          </main>

          <aside class="faceit-roster-panel">
            <div class="faceit-roster-title align-right">${esc(data.teamB.tag || data.teamB.name)}</div>
            <div class="faceit-roster-list">${(data.teamBPlayers || []).map(playerCard).join('') || '<div class="small">Нет игроков</div>'}</div>
          </aside>
        </div>
      </section>
    `;

    startTurnTimer();
  } finally {
    loading = false;
  }
}

function startTurnTimer() {
  const el = document.getElementById('turnTimer');
  clearInterval(window.__roomTimer);
  if (!el) return;
  const update = () => {
    const deadline = Number(el.dataset.deadline || 0);
    if (!deadline) { el.textContent = '0:30'; return; }
    const left = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
    el.textContent = formatClock(left);
  };
  update();
  window.__roomTimer = setInterval(update, 1000);
}

async function doVeto(map) {
  const res = await fetch(`/api/matches/${encodeURIComponent(id)}/veto-action`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ map })
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) {
    if (window.showToast) showToast((data && data.error) ? data.error : "Ошибка");
    else alert((data && data.error) ? data.error : "Ошибка");
    return;
  }
  loadRoom();
}

function copyConnect(text) {
  navigator.clipboard.writeText(text || "");
  if (window.showToast) showToast("Команда подключения скопирована", "success");
}

function toggleExtra() {
  const box = document.getElementById('extraPanel');
  if (box) box.classList.toggle('hidden');
}

loadRoom();
setInterval(loadRoom, 3500);
</script>
</body>
</html>
