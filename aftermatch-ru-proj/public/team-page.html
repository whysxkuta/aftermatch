<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Команда — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page"><section class="glass-panel"><div class="panel-body stack"><div><div class="kicker">team</div><h2>Команда</h2></div><div id="teamWrap" class="stack"></div></div></section></div><script>
fetch('/api/me/team',{credentials:'include'}).then(r=>r.json()).then(async t=>{ if(!t?.team_id){ teamWrap.innerHTML='<div class="card">Команды пока нет.</div>'; return; } const team=await fetch(`/api/teams/${t.team_id}`).then(r=>r.json()); const groups={captain:[],main:[],substitute:[],coach:[]}; (team.members||[]).forEach(m=>groups[m.role==='player'?'main':m.role].push(m)); teamWrap.innerHTML=`<div class="card"><h3>${team.name}</h3><div class="muted">#${team.tag||'без тега'}</div><div class="hero-actions">${t.role==='captain'?'<button id="renameTeamBtn" class="btn">Переименовать / сменить тег</button>':''}</div></div>` + [['captain','Капитан'],['main','Основной состав'],['substitute','Запасные'],['coach','Тренер']].map(([k,title])=>`<div class="card stack"><div class="kicker">${title}</div>${(groups[k]||[]).map(m=>`<div class="list-item"><div>${m.nickname}</div>${t.role==='captain'&&m.role!=='captain'?`<select onchange="setRole('${team.id}','${m.user_id}',this.value)"><option ${m.role==='main'?'selected':''} value="main">основной</option><option ${m.role==='substitute'?'selected':''} value="substitute">запасной</option><option ${m.role==='coach'?'selected':''} value="coach">тренер</option></select>`:''}</div>`).join('')||'<div class="muted">Пусто</div>'}</div>`).join(''); const btn=document.getElementById('renameTeamBtn'); if(btn) btn.onclick=async()=>{ const name=prompt('Новое имя команды',team.name); if(!name) return; const tag=prompt('Новый тег',team.tag||''); const r=await fetch(`/api/teams/${team.id}/identity`,{method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,tag})}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); showToast('Команда обновлена','success'); location.reload(); }; });
async function setRole(teamId,userId,role){ const r=await fetch(`/api/teams/${teamId}/members/${userId}/role`,{method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({role})}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); showToast('Роль обновлена','success'); location.reload(); }
</script><script src="/app.js"></script></body></html>
