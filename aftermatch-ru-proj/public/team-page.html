<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Команда — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page team-page"><div id="teamWrap" class="stack"></div></div><script>
function esc(v=''){ return String(v).replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s])); }
async function compressImage(file, mode='avatar'){
  const url = URL.createObjectURL(file); const img = await new Promise((res,rej)=>{const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url;});
  const cfg = mode==='banner' ? {w:1600,h:420,q:.84} : {w:512,h:512,q:.88};
  const c=document.createElement('canvas'); c.width=cfg.w; c.height=cfg.h; const ctx=c.getContext('2d');
  const srcRatio=img.width/img.height, dstRatio=cfg.w/cfg.h; let sx=0, sy=0, sw=img.width, sh=img.height;
  if(srcRatio>dstRatio){ sw = img.height*dstRatio; sx=(img.width-sw)/2; } else { sh = img.width/dstRatio; sy=(img.height-sh)/2; }
  ctx.drawImage(img,sx,sy,sw,sh,0,0,cfg.w,cfg.h); URL.revokeObjectURL(url); return c.toDataURL('image/webp', cfg.q);
}
async function uploadTeamImage(endpoint, file, mode){ const dataUrl = await compressImage(file, mode); const r = await fetch(endpoint,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataUrl})}); const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.error||'Ошибка'); return d; }
async function pickAndUpload(endpoint, mode){ const input=document.createElement('input'); input.type='file'; input.accept='image/png,image/jpeg,image/webp'; input.onchange=async()=>{ const f=input.files?.[0]; if(!f) return; try{ await uploadTeamImage(endpoint,f,mode); showToast('Сохранено','success'); location.reload(); }catch(e){ showToast(e.message||'Ошибка'); } }; input.click(); }
function createTeamForm(){ return `<section class="glass-panel"><div class="panel-body stack"><div class="kicker">team</div><h2>Создание команды</h2><div class="row gap"><input id="teamTag" placeholder="Тег" /><input id="teamName" placeholder="Название команды" /></div><button id="createTeamBtn" class="btn">Создать команду</button><div id="teamCreateErr" class="muted"></div></div></section>`; }
async function createTeam(){ const tag=(teamTag.value||'').trim(); const name=(teamName.value||'').trim(); const r=await fetch('/api/teams',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({tag,name})}); const d=await r.json().catch(()=>({})); if(!r.ok){ teamCreateErr.textContent=d.error||'Ошибка'; return; } showToast('Команда создана','success'); location.reload(); }
function memberRow(team, myRole, m){ const canEdit = myRole==='captain' && m.role!=='captain'; return `<div class="list-item"><div class="row gap"><div class="avatar sm" style="background-image:url('${m.avatar_url||''}')"></div><div><div><b>${esc(m.nickname)}</b>${m.role==='captain'?' <span class="badge accent">капитан</span>':''}</div><div class="tiny">${m.online?'online':'offline'}</div></div></div><div class="list-item-actions">${canEdit?`<select onchange="setRole('${team.id}','${m.user_id}',this.value)"><option ${m.role==='main'?'selected':''} value="main">основной</option><option ${m.role==='substitute'?'selected':''} value="substitute">запасной</option><option ${m.role==='coach'?'selected':''} value="coach">тренер</option></select>`:''}</div></div>`; }
fetch('/api/me/team',{credentials:'include'}).then(r=>r.ok?r.json():null).then(async t=>{
  if(!t?.team_id){ teamWrap.innerHTML=createTeamForm(); document.getElementById('createTeamBtn')?.addEventListener('click', createTeam); return; }
  const payload=await fetch(`/api/teams/${t.team_id}`,{credentials:'include'}).then(r=>r.json());
  const team=payload.team; const myRole=payload.myRole || t.role || null; const members = payload.members||[];
  const groups={main:[],substitute:[],coach:[]};
  members.forEach(m=>{ if(m.role==='captain' || m.role==='main' || m.role==='player') groups.main.push({...m, role:m.role==='player'?'main':m.role}); else if(m.role==='substitute') groups.substitute.push(m); else if(m.role==='coach') groups.coach.push(m); });
  const banner = team.banner_url || team.avatar_url || '';
  teamWrap.innerHTML = `
    <section class="glass-panel profile-hero-card team-hero-card" style="${banner?`background-image:url('${banner}')`:''}"><div class="profile-overlay"></div><div class="panel-body profile-hero-layout team-hero-layout">
      <div class="avatar-wrap"><div class="avatar lg profile-avatar" style="background-image:url('${team.avatar_url||''}')"></div>${myRole==='captain'?`<button class="edit-pencil avatar-pencil" id="editTeamAvatar" title="Изменить аватар"><svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4Z"></path><path d="M13 7l4 4"></path></svg></button>`:''}</div>
      <div class="profile-main-copy"><div class="kicker">команда</div><div class="profile-title-row"><h1>${esc(team.name||'Команда')}</h1>${myRole==='captain'?`<button id="renameTeamBtn" class="edit-pencil inline visible" title="Изменить имя и тег"><svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4Z"></path><path d="M13 7l4 4"></path></svg></button>`:''}</div><div class="muted">#${esc(team.tag||'без тега')}</div>${team.description?`<div class="muted" style="margin-top:12px;max-width:700px">${esc(team.description)}</div>`:''}</div>
      <div class="profile-hero-actions">${myRole==='captain'?`<button class="edit-pencil banner-pencil visible" id="editTeamBanner" title="Изменить шапку"><svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4Z"></path><path d="M13 7l4 4"></path></svg></button>`:''}</div>
    </div></section>
    <div class="grid one" style="margin-top:18px">
      <section class="glass-panel"><div class="panel-body stack"><div class="friend-head"><div><div class="kicker">roster</div><h2>Состав команды</h2></div></div>
        <div class="stack role-block"><div class="kicker">Основной состав</div>${groups.main.map(m=>memberRow(team,myRole,m)).join('')||'<div class="muted">Пусто</div>'}</div>
        <div class="stack role-block"><div class="kicker">Запасные</div>${groups.substitute.map(m=>memberRow(team,myRole,m)).join('')||'<div class="muted">Пусто</div>'}</div>
        <div class="stack role-block"><div class="kicker">Тренер</div>${groups.coach.map(m=>memberRow(team,myRole,m)).join('')||'<div class="muted">Пусто</div>'}</div>
      </div></section>
    </div>`;
  document.getElementById('renameTeamBtn')?.addEventListener('click', async()=>{ const name=prompt('Новое имя команды',team.name); if(!name) return; const tag=prompt('Новый тег',team.tag||''); const r=await fetch(`/api/teams/${team.id}/identity`,{method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,tag})}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); showToast('Команда обновлена','success'); location.reload(); });
  document.getElementById('editTeamAvatar')?.addEventListener('click',()=>pickAndUpload(`/api/teams/${team.id}/avatar`,'avatar'));
  document.getElementById('editTeamBanner')?.addEventListener('click',()=>pickAndUpload(`/api/teams/${team.id}/banner`,'banner'));
});
async function setRole(teamId,userId,role){ const r=await fetch(`/api/teams/${teamId}/members/${userId}/role`,{method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({role})}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); showToast('Роль обновлена','success'); location.reload(); }
</script><script src="/app.js"></script></body></html>
