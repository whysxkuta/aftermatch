<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Профиль — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page"><section id="profileHero" class="glass-panel profile-hero"><div class="profile-overlay"></div><div class="panel-body" style="display:contents"></div></section><div class="grid two"><section class="glass-panel"><div class="panel-body stack"><div><div class="kicker">profile</div><h2>Профиль игрока</h2></div><div id="profileMeta" class="stack"></div><div class="hero-actions"><button id="changeNickBtn" class="btn">Сменить ник</button></div></div></section><section class="glass-panel"><div class="panel-body stack"><div><div class="kicker">social</div><h2>Друзья и чаты</h2></div><div id="friendsWrap" class="list"></div><div id="chatsWrap" class="list"></div></div></section></div></div><script>
const id=new URLSearchParams(location.search).get('id');
Promise.all([fetch(`/api/players/${id}`).then(r=>r.json()),fetch('/api/friends',{credentials:'include'}).then(r=>r.ok?r.json():{friends:[],requests:[]}),fetch('/api/chats',{credentials:'include'}).then(r=>r.ok?r.json():[])]).then(([p,friends,chats])=>{ profileHero.style.backgroundImage=`url(${p.profile_banner_url||p.avatar_url||''})`; profileHero.innerHTML=`<div class="profile-overlay"></div><div class="panel-body profile-hero"><div class="avatar lg" style="background-image:url('${p.avatar_url||''}')"></div><div><div class="kicker">игрок</div><h2>${p.nickname}</h2><div class="muted">${p.first_name||''} ${p.last_name||''}</div></div><div class="badge">Steam ${p.steam_profile_name||'не привязан'}</div></div>`; profileMeta.innerHTML=`<div class="badge">Почта: ${p.email||'—'}</div><div class="badge">Онлайн: ${p.online?'да':'нет'}</div><div class="badge">Ник можно менять раз в месяц</div>`; friendsWrap.innerHTML = `<div class="kicker">друзья</div>` + (friends.friends||[]).map(x=>`<div class="list-item"><div>${x.friend?.nickname||'—'}</div></div>`).join('') + ((friends.requests||[]).length?`<div class="kicker">входящие заявки</div>`:'') + (friends.requests||[]).map(x=>`<div class="list-item"><div>${x.nickname}</div><div class="hero-actions"><button class="btn" onclick="respondReq('${x.id}','accept')">Принять</button><button class="btn" onclick="respondReq('${x.id}','decline')">Отклонить</button></div></div>`).join(''); chatsWrap.innerHTML = `<div class="kicker">личные чаты</div>` + (chats||[]).map(c=>`<div class="list-item"><div>${(c.members||[]).map(m=>m.nickname).join(', ')}</div><div class="tiny">${c.lastMessage?.text||'Пока пусто'}</div></div>`).join(''); });
changeNickBtn.onclick=async()=>{ const nickname=prompt('Новый ник'); if(!nickname) return; const r=await fetch('/api/auth/nickname',{method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname})}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); showToast('Ник обновлён','success'); location.reload(); };
async function respondReq(requestId,action){ const r=await fetch('/api/friends/respond',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({requestId,action})}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); location.reload(); }
</script><script src="/app.js"></script></body></html>
