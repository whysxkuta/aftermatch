<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aftermatch.ru — Профиль</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div>
      <div class="nav">
                <a href="/login.html">Вход</a>
        <a href="/register.html">Регистрация</a>
      </div>
    </div>
  </div>

  <div class="container">
    <h1 style="margin:0 0 14px 0;">Профиль</h1>
    <div id="profile" class="card">Загрузка...</div>
    <div style="height:14px"></div>
    <div id="teamInfo" class="card">Загрузка...</div>
  </div>

<script>
const q = new URLSearchParams(location.search);
const id = q.get("id");

async function refreshSteamAvatar() {
  const res = await fetch("/api/me/steam-avatar/refresh", { method:"POST", credentials:"include" });
  const data = await res.json().catch(()=>null);
  if (res.ok) location.reload();
}

async function uploadMyAvatar(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
  const res = await fetch("/api/me/avatar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ dataUrl })
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) return alert((data && data.error) ? data.error : `Ошибка (${res.status})`);
  location.reload();
}

async function refreshSteamNick() {
  const res = await fetch("/api/me/steam/refresh", { method:"POST", credentials:"include" });
  const data = await res.json().catch(()=>null);
  if (!res.ok) return alert((data && data.error) ? data.error : `Ошибка (${res.status})`);
  location.reload();
}

async function adminSave() {
  const err = document.getElementById("a_err");
  if (err) err.textContent = "";
  const payload = {
    nickname: document.getElementById("a_nick").value.trim(),
    lastName: document.getElementById("a_last").value.trim(),
    firstName: document.getElementById("a_first").value.trim(),
    middleName: document.getElementById("a_mid").value.trim()
  };
  const res = await fetch(`/api/users/${encodeURIComponent(id)}`, {
    method: "PATCH",
    headers: {"Content-Type":"application/json"},
    credentials: "include",
    body: JSON.stringify(payload)
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) { if(err) err.textContent = (data && data.error) ? data.error : "Ошибка"; return; }
  if(err) err.textContent = "Сохранено ✅";
  setTimeout(()=>location.reload(), 400);
}

async function createTeam() {
  const err = document.getElementById("ct_err");
  if (err) err.textContent = "";
  const tag = document.getElementById("ct_tag").value.trim();
  const name = document.getElementById("ct_name").value.trim();
  if (!tag || !name) { if(err) err.textContent = "Укажи тег и название."; return; }

  const res = await fetch("/api/teams", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    credentials: "include",
    body: JSON.stringify({ name, tag })
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) { if(err) err.textContent = (data && data.error) ? data.error : "Ошибка"; return; }
  location.reload();
}

function toggleCreateTeam(show) {
  const box = document.getElementById("createTeamBox");
  const btn = document.getElementById("showCreateTeam");
  if (!box || !btn) return;
  box.style.display = show ? "block" : "none";
  btn.style.display = show ? "none" : "block";
}

async function load() {
  const meRes = await fetch("/api/auth/me", { credentials: "include" });
  const meData = await meRes.json();
  const me = meData.user;

  const res = await fetch(`/api/players/${encodeURIComponent(id)}`, { credentials: "include" });
  const u = await res.json().catch(()=>null);
  if (!res.ok || !u) { document.getElementById("profile").textContent = (u && u.error) ? u.error : "Ошибка"; return; }

  const roleLabel = (u.role === "admin") ? "Админ" : "Игрок";
  const roleClass = (u.role === "admin") ? "admin" : "";
  const onlineHtml = u.online ? `<span class="online-dot"></span><span class="small">online</span>` : `<span class="small muted">offline</span>`;
  const steamText = u.steam_profile_name || "—";
  const canRefreshSteam = (me && me.id === u.id && me.steam_id64);
  const steamLink = u.steam_id64 ? `https://steamcommunity.com/profiles/${u.steam_id64}` : null;

  if (me && me.id === u.id && !u.avatar_url && u.steam_id64) {
    setTimeout(refreshSteamAvatar, 100);
  }

  document.getElementById("profile").innerHTML = `
    <div class="row" style="align-items:center; gap:18px;">
      <div class="avatar-wrap">
        <div class="profile-avatar ${u.avatar_url ? `` : `steam-default-avatar`}" style="${u.avatar_url ? `background-image:url(${u.avatar_url});background-size:cover;background-position:center;` : ``}"></div>
        ${me && me.id === u.id ? `<button class="avatar-edit-btn" id="editMyAvatar" title="Обновить аватар">✎</button><input id="myAvatarInput" type="file" accept=".png,.jpg,.jpeg,.webp" style="display:none" />` : ``}
      </div>
      <div style="flex:1;">
        <div class="player-card-name"><b>${u.nickname}</b> ${onlineHtml}</div>
        <div class="player-card-fullname small">${u.last_name} ${u.first_name}${u.middle_name ? " " + u.middle_name : ""}</div>
        <div class="small" style="margin-top:10px;">
          ${steamLink ? `<span style="display:inline-flex;align-items:center;gap:10px;"><a href="${steamLink}" target="_blank" style="color:inherit;text-decoration:none;">Steam: <span class="badge accent">${steamText}</span></a>${canRefreshSteam ? `<button class="btn" style="padding:6px 10px" onclick="refreshSteamNick()">⟳</button>` : ``}</span>` : `Steam: —`}
        </div>
      </div>
      <div><span class="badge ${roleClass}">${roleLabel}</span></div>
    </div>
  `;

  const editBtn = document.getElementById("editMyAvatar");
  const avatarInput = document.getElementById("myAvatarInput");
  if (editBtn && avatarInput) {
    editBtn.addEventListener("click", () => avatarInput.click());
    avatarInput.addEventListener("change", () => {
      const f = avatarInput.files && avatarInput.files[0];
      if (f) uploadMyAvatar(f);
    });
  }

  if (me && me.role === "admin") {
    const p = document.getElementById("profile");
    const box = document.createElement("div");
    box.innerHTML = `
      <hr/>
      <div class="kicker">Админ: редактирование игрока</div>
      <div class="row" style="gap:10px;"><div class="col"><input id="a_nick" placeholder="Ник" value="${u.nickname}" /></div></div>
      <div style="height:10px"></div>
      <div class="row" style="gap:10px;">
        <div class="col"><input id="a_last" placeholder="Фамилия" value="${u.last_name}" /></div>
        <div class="col"><input id="a_first" placeholder="Имя" value="${u.first_name}" /></div>
        <div class="col"><input id="a_mid" placeholder="Отчество" value="${u.middle_name || ""}" /></div>
      </div>
      <div style="height:10px"></div>
      <button class="btn primary" onclick="adminSave()">Сохранить</button>
      <div id="a_err" class="small" style="margin-top:10px;"></div>
    `;
    p.appendChild(box);
  }

  const teamEl = document.getElementById("teamInfo");
  const teamRes = await fetch(`/api/players/${encodeURIComponent(id)}/team`, { credentials: "include" });
  const teamData = await teamRes.json().catch(()=>null);
  if (!teamRes.ok || !teamData) {
    teamEl.innerHTML = `<h2>Команда</h2><div class="small">Ошибка загрузки команды</div>`;
    return;
  }

  if (!teamData.team) {
    if (me && me.id === u.id) {
      teamEl.innerHTML = `
        <h2>Команда</h2>
        <div class="small">Не состоит в команде</div>
        <hr/>
        <div class="row" style="justify-content:center;">
          <div style="width:100%; max-width:520px;">
            <button id="showCreateTeam" class="btn primary" style="width:100%;" onclick="toggleCreateTeam(true)">Создать команду?</button>
            <div id="createTeamBox" style="display:none; margin-top:12px;">
              <div class="row" style="gap:10px;">
                <div class="col"><div class="small">Тег</div><input id="ct_tag" placeholder="TAG" /></div>
                <div class="col"><div class="small">Название</div><input id="ct_name" placeholder="Team Name" /></div>
              </div>
              <div style="height:10px"></div>
              <button class="btn primary" style="width:100%;" onclick="createTeam()">Создать</button>
              <button class="btn" style="width:100%; margin-top:8px;" onclick="toggleCreateTeam(false)">Отмена</button>
              <div id="ct_err" class="small" style="margin-top:10px;"></div>
            </div>
          </div>
        </div>
      `;
    } else {
      teamEl.innerHTML = `<h2>Команда</h2><div class="small">Не состоит в команде</div>`;
    }
    return;
  }

  const t = teamData.team;
  const playersCount = teamData.playersCount || 0;
  const desc = (t.description || "").toString();
  const clipped = desc.length > 90 ? desc.slice(0, 90) + "…" : desc;

  teamEl.innerHTML = `
    <h2>Команда</h2>
    <a href="/team-page.html?id=${encodeURIComponent(t.id)}" style="text-decoration:none;color:inherit;">
      <div class="row" style="align-items:center; gap:18px;">
        <div class="team-avatar-sm ${t.avatar_url ? `` : `steam-default-avatar`}" style="${t.avatar_url ? `background-image:url(${t.avatar_url});background-size:cover;background-position:center;` : ``}"></div>
        <div>
          <div><b>${t.name}</b></div>
          <div class="small muted">${t.tag ? `[${t.tag}]` : ""}</div>
          <div class="small">${clipped}</div>
          <div class="small">Игроков: <span class="badge">${playersCount}</span></div>
        </div>
      </div>
    </a>
  `;
}

load();
</script>
</body>
</html>
