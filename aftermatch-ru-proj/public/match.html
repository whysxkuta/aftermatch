<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Match Room — LAN</title>
  <link rel="stylesheet" href="/style.css" />
<script src="/app.js" defer></script>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
<div>
        <div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div>
</div>
    </div>
    <div class="nav">
      <a href="/">Главная</a>
        
      
      <a href="/login.html">Вход</a>
      <a href="/register.html">Регистрация</a>
      </div>
  </div>
</div>

<div class="container">
  <div class="row" style="align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
    <h1>Match Room</h1>
    <div class="row" style="gap:8px; align-items:center;">
      <a class="btn" id="matchRoomLink" href="#">Комната матча</a>
      <div class="small">· <a href="/">Главная</a></div>
    </div>
  </div>

  <div id="top" class="card small">Загрузка...</div>

  <div class="row">
    <div class="col card">
      <h2>Ready</h2>
      <div id="readyInfo" class="small"></div>
      <div style="height:10px"></div>
      <div class="row">
        <button class="btn primary" onclick="ready('A')">Ready: Team A</button>
        <button class="btn primary" onclick="ready('B')">Ready: Team B</button>
      </div>
    </div>

    <div class="col card">
      <h2>Сервер на матч</h2>
      <div class="small">Назначение сервера требует входа админом.</div>
      <hr/>
      <select id="serverSelect"></select>
      <div style="height:10px"></div>
      <button class="btn primary" onclick="assignServer()">Назначить сервер</button>
      <div id="srvErr" class="small" style="margin-top:10px;"></div>
      <hr/>
      <div class="small">Connect:</div>
      <div id="connect" class="code">—</div>
    </div>
  </div>

  <div class="card">
    <h2>Veto</h2>
    <div id="vetoMeta" class="small">—</div>
    <hr/>
    <div id="maps" class="grid"></div>
    <hr/>
    <div class="row">
      <div class="col">
        <h3>Лог</h3>
        <div id="log" class="small"></div>
      </div>
      <div class="col">
        <h3>Карты серии</h3>
        <div id="seriesMaps" class="small"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Результат (вручную)</h2>
    <div class="small">Сохранение результата требует входа админом.</div>
    <div class="row">
      <div class="col"><input id="winner" placeholder="winnerTeamId (A или B тоже ок)" /></div>
      <div class="col"><input id="scoreA" placeholder="scoreA" /></div>
      <div class="col"><input id="scoreB" placeholder="scoreB" /></div>
    </div>
    <div style="height:10px"></div>
    <button class="btn primary" onclick="reportResult()">Сохранить результат</button>
    <div id="resultErr" class="small" style="margin-top:10px;"></div>
    <div id="resultView" class="small" style="margin-top:10px;"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const params = new URLSearchParams(location.search);
const matchId = params.get("matchId") || params.get("id");
if (!matchId) alert("Нужен matchId в URL: /match.html?matchId=...");

const socket = io();
let me = null;
let mySide = null;

let state = null;

async function loadMeAndSide() {
  try {
    const meRes = await fetch("/api/auth/me", { credentials: "include" });
    const meData = await meRes.json();
    me = meData.user;
    const capRes = await fetch(`/api/matches/${matchId}/captains`);
    const caps = await capRes.json();
    if (me && caps.captainA === me.id) mySide = "A";
    if (me && caps.captainB === me.id) mySide = "B";
  } catch {}
}


function stepText(veto) {
  const step = veto.steps[veto.stepIndex];
  if (!step) return "Veto завершён";
  const sideName = step.by === "A" ? "Team A" : "Team B";
  return `Ход: ${sideName} — ${step.type.toUpperCase()}`;
}

async function loadServersOnce() {
  const sel = document.getElementById("serverSelect");
  if (sel.dataset.loaded === "1") return;
  const res = await fetch("/api/servers", { credentials: "include" });
  const rows = await res.json();
  sel.innerHTML = rows.map(s => `<option value="${s.id}">${s.name} (${s.ip}:${s.port})</option>`).join("");
  sel.dataset.loaded = "1";
}

function render() {
  if (!state) return;

  document.getElementById("top").innerHTML = `
    <div><b>${state.tournament.name}</b></div>
    <div class="small">
      <span class="badge">${state.tournament.mode}</span>
      <span class="badge">BO${state.tournament.bo}</span>
      <span class="badge">match: ${state.id}</span>
      <span class="badge ${state.status==="ready"?"ok":(state.status==="veto"?"warn":(state.status==="finished"?"accent":""))}">status: ${state.status}</span>
    </div>
    <div style="height:6px"></div>
    <div><b>${state.teamA.name}</b> vs <b>${state.teamB.name}</b></div>
  `;

  document.getElementById("readyInfo").innerHTML =
    state.veto ? `Team A: ${state.veto.ready.A ? "✅" : "⏳"}<br/>Team B: ${state.veto.ready.B ? "✅" : "⏳"}` : "—";

  document.getElementById("connect").textContent = state.connect || "—";
  const roomLink = document.getElementById("matchRoomLink");
  if (roomLink) roomLink.href = `/match-room.html?id=${encodeURIComponent(state.id)}`;

  loadServersOnce().then(() => {
    if (state.server) document.getElementById("serverSelect").value = state.server.id;
  });

  const veto = state.veto;
  if (!veto) return;

  document.getElementById("vetoMeta").innerHTML = `
    ${mySide ? `Ты капитан: <span class="badge accent">Team ${mySide}</span><br/>` : ``}
    ${stepText(veto)}<br/>
    Remaining: <span class="badge">${veto.remaining.length}</span>
    ${veto.decider ? ` · Decider: <span class="badge">${veto.decider}</span>` : ""}
  `;

  const pool = state.tournament.mapPool;
  const remaining = new Set(veto.remaining);
  const actions = veto.actions || [];
  const banned = new Set(actions.filter(a => a.type==="ban").map(a => a.map));
  const picked = new Set(actions.filter(a => a.type==="pick").map(a => a.map));

  document.getElementById("maps").innerHTML = pool.map(m => {
    const isRem = remaining.has(m);
    const cls = ["map"];
    if (!isRem) cls.push("disabled");
    if (banned.has(m)) cls.push("banned");
    if (picked.has(m)) cls.push("picked");
    return `<div class="${cls.join(" ")}" onclick="act('${m}')">${m}</div>`;
  }).join("");

  const logEl = document.getElementById("log");
  logEl.innerHTML = actions.length ? actions.map(a => {
    const who = a.by === "A" ? state.teamA.name : state.teamB.name;
    return `<div><span class="badge">${a.type.toUpperCase()}</span> ${who}: <b>${a.map}</b></div>`;
  }).join("") : "Пока пусто.";

  document.getElementById("seriesMaps").innerHTML = state.maps && state.maps.length
    ? state.maps.map((m, i) => `<div><span class="badge">#${i+1}</span> <b>${m}</b></div>`).join("")
    : "Ещё не определены.";

  document.getElementById("resultView").innerHTML = state.result ? `
    Winner: <span class="badge">${state.result.winnerTeamId}</span><br/>
    Score: ${state.result.score.a} - ${state.result.score.b}<br/>
    Maps: ${(state.result.maps||[]).join(", ")}
  ` : "—";
}

function ready(side) { socket.emit("match:ready", { matchId, side }); }

function act(map) {
  if (!state || !state.veto) return;
  const veto = state.veto;
  if (!veto.ready.A || !veto.ready.B) return alert("Обе стороны должны нажать Ready.");
  const step = veto.steps[veto.stepIndex];
  if (!step) return alert("Veto уже завершён.");

  if (!mySide) return alert("Veto может делать только капитан (нужен вход).");
  if (step.by !== mySide) return alert("Сейчас не твой ход.");

  socket.emit("veto:action", { matchId, side: mySide, type: step.type, map });
}

async function assignServer() {
  document.getElementById("srvErr").textContent = "";
  const serverId = document.getElementById("serverSelect").value;
  const res = await fetch(`/api/matches/${matchId}/assign-server`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ serverId })
  });
  const data = await res.json();
  if (!res.ok) document.getElementById("srvErr").textContent = data.error || "Ошибка";
}

async function reportResult() {
  document.getElementById("resultErr").textContent = "";
  const w = document.getElementById("winner").value.trim();
  const winnerTeamId = (w === "A") ? state.teamA.id : (w === "B") ? state.teamB.id : w;
  const scoreA = document.getElementById("scoreA").value.trim();
  const scoreB = document.getElementById("scoreB").value.trim();
  const res = await fetch(`/api/matches/${matchId}/report-result`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ winnerTeamId, scoreA, scoreB })
  });
  const data = await res.json();
  if (!res.ok) document.getElementById("resultErr").textContent = data.error || "Ошибка";
}

loadMeAndSide().then(() => socket.emit("match:join", { matchId }));
// connect handled by browser automatically
socket.on("connect", () => {});
socket.on("match:state", (s) => { state = s; render(); });
</script>
</body>
</html>
