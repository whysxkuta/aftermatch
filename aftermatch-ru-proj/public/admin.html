<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Админка — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page"><section class="glass-panel"><div class="panel-body stack"><div><div class="kicker">admin</div><h1>Панель администратора</h1><div id="me" class="muted">Загрузка...</div></div><div class="admin-tabs"><button class="admin-tab active" data-tab="users">Пользователи</button><button class="admin-tab" data-tab="tournaments">Турниры</button><button class="admin-tab" data-tab="servers">Серверы</button></div>
<div id="pane-users" class="admin-pane active stack"><div class="row gap"><input id="userSearch" placeholder="Поиск по нику или Steam" /></div><div id="users"></div></div>
<div id="pane-tournaments" class="admin-pane stack"><div class="card stack"><div class="kicker">создать турнир</div><div class="row gap"><input id="t_name" placeholder="Название" /><input id="t_desc" placeholder="Описание" /></div><div class="row gap"><select id="t_mode"><option value="5v5">5v5</option><option value="2v2">2v2</option><option value="1v1">1v1</option></select><select id="t_bracket"><option value="single_elim">Single Elimination</option><option value="double_elim">Double Elimination</option></select><input id="t_maxTeams" type="number" min="2" placeholder="Макс. команд" /></div><div class="row gap"><input id="t_checkin" type="datetime-local" /><input id="t_start" type="datetime-local" /></div><button class="btn" id="createTournamentBtn">Создать турнир</button><div id="t_err" class="muted"></div></div><div id="t_list"></div></div>
<div id="pane-servers" class="admin-pane stack"><div class="card stack"><div class="kicker">добавить сервер</div><div class="row gap"><input id="s_name" placeholder="Название сервера" /><input id="s_ip" placeholder="IP" /><input id="s_port" type="number" placeholder="Порт" /><input id="s_rcon" placeholder="RCON пароль" /></div><button class="btn" id="createServerBtn">Создать сервер</button><div id="s_err" class="muted"></div></div><div id="servers"></div></div>
</div></section></div><script>
function esc(v=''){ return String(v).replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s])); }
let allUsers=[];
async function refreshMe(){ const r=await fetch('/api/auth/me',{credentials:'include'}); const d=await r.json().catch(()=>({})); me.textContent = d.user ? `Ты: ${d.user.nickname} (${d.user.role})` : 'Не авторизован'; }
function bindTabs(){ document.querySelectorAll('.admin-tab').forEach(btn=>btn.onclick=()=>{ document.querySelectorAll('.admin-tab').forEach(b=>b.classList.toggle('active', b===btn)); document.querySelectorAll('.admin-pane').forEach(p=>p.classList.remove('active')); document.getElementById('pane-'+btn.dataset.tab).classList.add('active'); }); }
async function refreshUsers(){ const r=await fetch('/api/players',{credentials:'include'}); allUsers=await r.json().catch(()=>[]); renderUsers(); }
function renderUsers(){ const q=(userSearch.value||'').trim().toLowerCase(); const rows=(allUsers||[]).filter(u=>!q || (u.nickname||'').toLowerCase().includes(q) || (u.steam_profile_name||'').toLowerCase().includes(q)); users.innerHTML = rows.length ? rows.map(u=>`<div class="list-item"><div><div><b>${esc(u.nickname)}</b> <span class="badge ${u.role==='admin'?'accent':''}">${esc(u.role)}</span></div><div class="tiny">${esc([u.first_name,u.last_name].filter(Boolean).join(' '))}</div></div><div class="list-item-actions"><button class="btn" onclick="makeAdmin('${u.id}')">Сделать админом</button></div></div>`).join('') : '<div class="muted">Ничего не найдено</div>'; }
async function makeAdmin(id){ const r=await fetch(`/api/admin/users/${encodeURIComponent(id)}/make-admin`,{method:'POST',credentials:'include'}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); refreshUsers(); }
async function refreshTournaments(){ const r=await fetch('/api/tournaments',{credentials:'include'}); const rows=await r.json().catch(()=>[]); t_list.innerHTML = rows.length ? rows.map(t=>`<div class="list-item"><div><b>${esc(t.name)}</b><div class="tiny">${esc(t.description||'')}</div></div><div class="list-item-actions"><a class="btn" href="/tournament.html?id=${encodeURIComponent(t.id)}">Открыть</a><a class="btn" href="/tournament-settings.html?id=${encodeURIComponent(t.id)}">Настройки</a></div></div>`).join('') : '<div class="muted">Пока пусто</div>'; }
createTournamentBtn.onclick = async()=>{ const payload={name:t_name.value.trim(),description:t_desc.value.trim(),mode:t_mode.value,bracketMode:t_bracket.value,maxTeams:Number(t_maxTeams.value||0),checkinUntil:t_checkin.value,matchesStartAt:t_start.value}; const r=await fetch('/api/tournaments',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const d=await r.json().catch(()=>({})); if(!r.ok){ t_err.textContent=d.error||'Ошибка'; return; } t_err.textContent='Турнир создан'; refreshTournaments(); };
async function refreshServers(){ const r=await fetch('/api/admin/servers',{credentials:'include'}); const rows=await r.json().catch(()=>[]); servers.innerHTML = rows.length ? rows.map(s=>`<div class="list-item"><div><b>${esc(s.name)}</b><div class="tiny">${esc(s.ip||s.host||'')}:${esc(s.port||'')}</div></div><div class="list-item-actions"><code>${esc(s.sync_token||'')}</code><button class="btn" onclick="deleteServer('${s.id}')">Удалить</button></div></div>`).join('') : '<div class="muted">Пока пусто</div>'; }
createServerBtn.onclick = async()=>{ const payload={name:s_name.value.trim(),ip:s_ip.value.trim(),port:Number(s_port.value||0),rcon_password:s_rcon.value.trim()}; const r=await fetch('/api/servers',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const d=await r.json().catch(()=>({})); if(!r.ok){ s_err.textContent=d.error||'Ошибка'; return; } s_err.textContent='Сервер создан'; refreshServers(); };
async function deleteServer(id){ const r=await fetch(`/api/servers/${encodeURIComponent(id)}`,{method:'DELETE',credentials:'include'}); const d=await r.json().catch(()=>({})); if(!r.ok) return showToast(d.error||'Ошибка'); refreshServers(); }
userSearch.addEventListener('input', renderUsers); bindTabs(); refreshMe(); refreshUsers(); refreshTournaments(); refreshServers();
</script><script src="/app.js"></script></body></html>
