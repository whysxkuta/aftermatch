<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Админка — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page"><section class="glass-panel"><div class="panel-body stack"><div class="grid three"><button class="btn auth-tab active">Пользователи</button><button class="btn auth-tab">Турниры</button><button class="btn auth-tab">Серверы</button></div><div class="grid two"><div class="card stack"><div class="kicker">server mail</div><h3>Gmail для кодов</h3><div id="gmailInfo" class="tiny"></div></div><div class="card stack"><div class="kicker">routes</div><h3>Новые API</h3><div class="tiny">/api/auth/send-register-code<br>/api/auth/request-password-reset<br>/api/auth/reset-password<br>/api/friends<br>/api/chats<br>/api/teams/:id/identity<br>/api/teams/:id/members/:userId/role<br>/api/tournaments/:id/register-player</div></div></div></div></section></div><script>
fetch('/api/meta/gmail-setup',{credentials:'include'}).then(r=>r.json()).then(d=>{ gmailInfo.innerHTML=(d.needs||[]).map(x=>`• ${x}`).join('<br>') + `<br><br>Статус: ${d.configured?'настроено':'не настроено'}`; }).catch(()=>{ gmailInfo.textContent='Недоступно'; });
</script><script src="/app.js"></script></body></html>
