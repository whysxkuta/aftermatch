<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Войдите в аккаунт — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body>
<div class="shell-page auth-shell"><section class="glass-panel auth-panel"><div class="panel-body auth-body"><div class="auth-center"><div class="kicker">AUTH</div><h1 class="auth-title-main">Войдите в аккаунт</h1><div class="auth-switchers"><button class="auth-switch active" data-tab="login">Вход</button><button class="auth-switch" data-tab="register">Регистрация</button></div></div>
<div class="auth-card stack">
<form id="loginForm" class="stack auth-form"><input name="login" placeholder="Почта или логин"><input name="password" type="password" placeholder="Пароль"><div class="auth-inline-link"><button type="button" class="link-button" id="openResetLink">Забыли пароль?</button></div><button class="btn primary">Войти</button><a class="btn" href="/auth/steam?mode=login">Войти через Steam</a></form>
<form id="registerForm" class="stack auth-form hidden"><div id="steamGate" class="stack"><a class="btn" href="/auth/steam?mode=register" class="btn steam-btn">Войдите через Steam</a></div><div id="registerFields" class="stack hidden"><div class="form-grid"><input name="firstName" placeholder="Имя"><input name="lastName" placeholder="Фамилия"><input name="middleName" placeholder="Отчество"><input name="nickname" placeholder="Логин"></div><input name="email" placeholder="Почта"><input name="password" type="password" placeholder="Пароль"><input name="passwordRepeat" type="password" placeholder="Повторите пароль"><button class="btn primary" id="createAccountBtn">Создать аккаунт</button></div><div id="registerCodeStage" class="auth-code-stage hidden"><div class="auth-code-title">Давайте подтвердим вашу почту</div><div class="muted auth-code-sub">Мы отправили вам 6-ти значный код на указанную почту</div><div class="code-boxes" id="registerCodeBoxes"><input inputmode="numeric" maxlength="1" class="code-cell" data-idx="0"><input inputmode="numeric" maxlength="1" class="code-cell" data-idx="1"><input inputmode="numeric" maxlength="1" class="code-cell" data-idx="2"><input inputmode="numeric" maxlength="1" class="code-cell" data-idx="3"><input inputmode="numeric" maxlength="1" class="code-cell" data-idx="4"><input inputmode="numeric" maxlength="1" class="code-cell" data-idx="5"></div><div class="auth-resend">Не получили код? <button type="button" class="link-button" id="resendRegisterCode">Отправить повторно</button><span id="registerCooldown" class="muted"></span></div><div class="hero-actions"><button type="button" class="btn" id="backToRegister">Назад</button><button type="button" class="btn primary" id="confirmRegisterBtn">Подтвердить и создать</button></div></div></form>
<form id="resetForm" class="stack auth-form hidden"><input name="email" placeholder="Почта"><button type="button" class="btn" id="sendResetCode">Отправить код</button><input name="code" placeholder="Код из письма"><input name="password" type="password" placeholder="Новый пароль"><button class="btn primary">Сменить пароль</button></form>
</div></div></section></div>
<script>
(function(){
 const $=id=>document.getElementById(id); const loginForm=$('loginForm'), registerForm=$('registerForm'), resetForm=$('resetForm');
 const tabs=[...document.querySelectorAll('[data-tab]')]; const forms={login:loginForm, register:registerForm, reset:resetForm};
 const steamLinked = new URLSearchParams(location.search).get('steam')==='linked';
 const hasSteamLink = steamLinked || sessionStorage.getItem('steamLinked')==='1';
 let registerCooldownUntil=0;
 function toast(message,type='error'){ if(window.showToast) return window.showToast(message,type); alert(message); }
 async function api(url, opts={}){ const r=await fetch(url,{credentials:'include',headers:{'Content-Type':'application/json',...(opts.headers||{})},...opts}); const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.error||`Ошибка ${r.status}`); return d; }
 function setTab(tab){ tabs.forEach(x=>x.classList.toggle('active',x.dataset.tab===tab)); Object.entries(forms).forEach(([k,v])=>v.classList.toggle('hidden',k!==tab)); history.replaceState({},'',`/auth.html?mode=${tab}${(sessionStorage.getItem('steamLinked')==='1')&&tab==='register'?'&steam=linked':''}`); }
 tabs.forEach(btn=>btn.addEventListener('click',()=>setTab(btn.dataset.tab)));
 $('openResetLink').addEventListener('click',()=>setTab('reset'));
 setTab(new URLSearchParams(location.search).get('mode')||'login');
 if(steamLinked){ sessionStorage.setItem('steamLinked','1'); }
 if(hasSteamLink){ $('steamGate').classList.add('hidden'); $('registerFields').classList.remove('hidden'); }
 function startCooldown(sec=120){ registerCooldownUntil=Date.now()+sec*1000; updateCooldown(); }
 function updateCooldown(){ const el=$('registerCooldown'), btn=$('resendRegisterCode'); const remain=Math.max(0,Math.ceil((registerCooldownUntil-Date.now())/1000)); if(remain>0){ btn.disabled=true; el.textContent=` (${Math.floor(remain/60)}:${String(remain%60).padStart(2,'0')})`; } else { btn.disabled=false; el.textContent=''; } }
 setInterval(updateCooldown,1000);
 function registerCode(){ return [...document.querySelectorAll('#registerCodeBoxes .code-cell')].map(x=>x.value.trim()).join(''); }
 document.querySelectorAll('#registerCodeBoxes .code-cell').forEach((input,idx,arr)=>{ input.addEventListener('input',()=>{ input.value=input.value.replace(/\D/g,'').slice(0,1); if(input.value&&arr[idx+1]) arr[idx+1].focus(); }); input.addEventListener('keydown',(e)=>{ if(e.key==='Backspace'&&!input.value&&arr[idx-1]) arr[idx-1].focus(); }); });
 async function sendRegisterCode(){ const fd=new FormData(registerForm); const email=String(fd.get('email')||'').trim(); if(!email) return toast('Сначала укажи почту'); try{ await api('/api/auth/send-register-code',{method:'POST',body:JSON.stringify({email})}); $('registerFields').classList.add('hidden'); $('registerCodeStage').classList.remove('hidden'); startCooldown(120); toast('Код отправлен','success'); }catch(err){ toast(err.message); } }
 $('createAccountBtn').addEventListener('click', async (e)=>{ e.preventDefault(); const fd=new FormData(registerForm); const p1=String(fd.get('password')||''); const p2=String(fd.get('passwordRepeat')||''); if(!(sessionStorage.getItem('steamLinked')==='1' || steamLinked)) return toast('Сначала войдите через Steam'); if(!fd.get('email')||!fd.get('nickname')||!fd.get('firstName')||!fd.get('lastName')) return toast('Заполните обязательные поля'); if(!p1) return toast('Укажи пароль'); if(p1!==p2) return toast('Пароли не совпадают'); await sendRegisterCode(); });
 $('resendRegisterCode').addEventListener('click', async ()=>{ if(Date.now()<registerCooldownUntil) return; await sendRegisterCode(); });
 $('backToRegister').addEventListener('click',()=>{ $('registerCodeStage').classList.add('hidden'); $('registerFields').classList.remove('hidden'); });
 $('confirmRegisterBtn').addEventListener('click', async ()=>{ const fd=Object.fromEntries(new FormData(registerForm)); fd.code=registerCode(); delete fd.passwordRepeat; try{ await api('/api/auth/register',{method:'POST',body:JSON.stringify(fd)}); sessionStorage.removeItem('steamLinked'); location.href='/tournaments.html'; }catch(err){ toast(err.message); } });
 loginForm.addEventListener('submit', async(e)=>{ e.preventDefault(); try{ await api('/api/auth/login',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(loginForm)))}); location.href='/tournaments.html'; }catch(err){ toast(err.message); } });
 resetForm.addEventListener('submit', async(e)=>{ e.preventDefault(); try{ await api('/api/auth/reset-password',{method:'POST',body:JSON.stringify(Object.fromEntries(new FormData(resetForm)))}); toast('Пароль обновлён','success'); setTab('login'); }catch(err){ toast(err.message); } });
 $('sendResetCode').addEventListener('click', async()=>{ const email=String(resetForm.elements.email.value||'').trim(); if(!email) return toast('Сначала укажи почту'); try{ await api('/api/auth/request-password-reset',{method:'POST',body:JSON.stringify({email})}); toast('Если почта существует, код отправлен','success'); }catch(err){ toast(err.message); } });
 const params=new URLSearchParams(location.search); const err=params.get('err'); if(err==='steam_already_linked'){ sessionStorage.removeItem('steamLinked'); toast('Этот Steam уже привязан к другому аккаунту'); setTab('register'); } if(err==='steam_failed'){ sessionStorage.removeItem('steamLinked'); toast('Не удалось выполнить вход через Steam'); setTab(params.get('mode')||'register'); }
})();
</script><script src="/app.js"></script></body></html>
