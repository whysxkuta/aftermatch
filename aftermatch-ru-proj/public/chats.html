<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Чаты — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page"><section class="glass-panel"><div class="panel-body stack"><div><div class="kicker">social</div><h2>Личные чаты</h2></div><div id="chatsWrap" class="list"><div class="muted">Загрузка…</div></div></div></section></div><script>fetch('/api/chats',{credentials:'include'}).then(r=>r.ok?r.json():[]).then(chats=>{chatsWrap.innerHTML=(chats||[]).length?(chats||[]).map(c=>`<div class="list-item"><div>${(c.members||[]).map(m=>m.nickname).join(', ')}</div><div class="tiny">${c.lastMessage?.text||'Пока пусто'}</div></div>`).join(''):'<div class="muted">Пока нет чатов</div>';});</script><script src="/app.js"></script></body></html>
