<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aftermatch.ru - Турниры</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner topbar-home">
      <div class="brand">
        <div>
          <div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div>
        </div>
      </div>
      <div class="nav"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">
      <h1 style="margin:0;">Турниры</h1>
      <div class="small" id="tCount"></div>
    </div>
    <div id="tours" class="tour-grid"></div>
  </div>

<script>
async function loadTournamentsPage() {
  const el = document.getElementById("tours");
  const res = await fetch("/api/tournaments", { credentials: "include" });
  const rows = await res.json().catch(()=>[]);
  const q = (new URLSearchParams(location.search).get("q") || "").trim().toLowerCase();
  const filtered = !q ? rows : rows.filter(t => `${t.name||""} ${t.description||""}`.toLowerCase().includes(q));
  document.getElementById("tCount").textContent = Array.isArray(filtered) ? `${filtered.length}` : "";

  if (!Array.isArray(filtered) || !filtered.length) {
    el.innerHTML = "<div class='card'>Пока нет турниров.</div>";
    return;
  }

  el.innerHTML = filtered.map(t => `
    <a class="card tour-card" href="/tournament.html?id=${encodeURIComponent(t.id)}" style="text-decoration:none; color:inherit;">
      <div class="tour-thumb" style="${t.cover_url ? `background-image:url(${t.cover_url});background-size:cover;background-position:center;` : ``}"></div>
      <div style="height:10px"></div>
      <div style="font-size:18px;"><b>${t.name}</b></div>
      <div class="small" style="margin-top:6px;">${t.description || ""}</div>
      <div style="height:10px"></div>
      ${t.has_prizes ? `<div class="badge accent">С призами</div>` : `<div class="badge">Без призовых</div>`}
    </a>
  `).join("");
}
loadTournamentsPage();
</script>
</body>
</html>
