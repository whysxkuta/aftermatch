<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Турниры — aftermatch.ru</title><link rel="stylesheet" href="/style.css"></head><body><div class="shell-page"><section class="glass-panel"><div class="panel-body stack"><div><div class="kicker">tournaments</div><h2>Турниры</h2></div><div id="tourGrid" class="grid three"></div></div></section></div><script>
fetch('/api/tournaments').then(r=>r.json()).then(items=>{ tourGrid.innerHTML=items.map(t=>`<a class="card stack" href="/tournament.html?id=${t.id}"><div class="kicker">${(t.mode||'').toUpperCase()} • BO${t.bo||1}</div><h3>${t.name}</h3><div class="muted">${t.description||'Без описания'}</div><div class="badge">Регистрация до <span data-msk="${t.registration_until||'—'}"></span></div></a>`).join(''); document.querySelectorAll('[data-msk]').forEach(el=>{const v=el.getAttribute('data-msk'); el.textContent=(v&&v!=='—'?v:'—')+(v&&v!=='—'?' МСК':'');});});
</script><script src="/app.js"></script></body></html>
