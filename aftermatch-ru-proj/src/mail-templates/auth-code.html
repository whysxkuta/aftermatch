<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>{{TITLE}}</title>
  </head>
  <body style="margin:0;padding:0;background:#06070b;font-family:Inter,Arial,sans-serif;color:#f5f7fb;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{TITLE}} — {{CODE}}</div>
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#06070b;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:640px;">
            <tr>
              <td style="padding-bottom:16px;color:#8c95a8;font-size:12px;letter-spacing:0.24em;text-transform:uppercase;">{{APP_NAME}}</td>
            </tr>
            <tr>
              <td style="border:1px solid rgba(255,255,255,0.14);border-radius:28px;background:linear-gradient(145deg, rgba(255,255,255,0.11), rgba(255,255,255,0.05));box-shadow:0 20px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.12);overflow:hidden;">
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                  <tr>
                    <td style="padding:28px 28px 12px;">
                      <div style="height:120px;border-radius:22px;background:
                        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.20), rgba(255,255,255,0.02) 28%),
                        radial-gradient(circle at 85% 30%, rgba(255,59,110,0.22), rgba(255,59,110,0.02) 24%),
                        radial-gradient(circle at 55% 80%, rgba(76,121,255,0.18), rgba(76,121,255,0.02) 28%),
                        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));"></div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:0 28px 8px;font-size:32px;line-height:1.05;font-weight:800;color:#ffffff;">{{TITLE}}</td>
                  </tr>
                  <tr>
                    <td style="padding:0 28px 20px;font-size:16px;line-height:1.7;color:#ccd3df;">{{INTRO}}</td>
                  </tr>
                  <tr>
                    <td style="padding:0 28px 8px;color:#8c95a8;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;">{{CODE_LABEL}}</td>
                  </tr>
                  <tr>
                    <td style="padding:0 28px 12px;">
                      <div style="display:inline-block;padding:18px 24px;border-radius:22px;border:1px solid rgba(255,255,255,0.12);background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));box-shadow:inset 0 1px 0 rgba(255,255,255,0.10);font-size:34px;line-height:1;font-weight:800;letter-spacing:0.30em;color:#ffffff;">{{CODE}}</div>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding:0 28px 24px;font-size:14px;line-height:1.7;color:#a6afbf;">{{EXPIRES_TEXT}}</td>
                  </tr>
                  <tr>
                    <td style="padding:18px 28px 26px;border-top:1px solid rgba(255,255,255,0.08);font-size:13px;line-height:1.7;color:#7f8797;">
                      Нужна помощь? Напишите на aftermatchru@gmail.com<br />
                      © {{YEAR}} {{APP_NAME}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
