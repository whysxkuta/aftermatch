<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Комната матча — aftermatch.ru</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div>
      <div class="nav"></div>
    </div>
  </div>

  <div class="container">
    <div id="roomHead" class="card">Загрузка...</div>
    <div style="height:14px"></div>
    <div class="match-room-layout">
      <div class="card">
        <h2>Команды</h2>
        <div id="teamsBox">Загрузка...</div>
      </div>
      <div class="card">
        <h2>Veto карт</h2>
        <div id="turnBox" class="small">Загрузка...</div>
        <div style="height:12px"></div>
        <div id="mapsGrid" class="maps-grid"></div>
        <div style="height:12px"></div>
        <div id="actionsLog" class="small"></div>
      </div>
      <div class="card">
        <h2>Сервер матча</h2>
        <div id="serverBox" class="small">Загрузка...</div>
      </div>
    </div>
  </div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(v){
  if(!v) return "—";
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return esc(v);
  return d.toLocaleString("ru-RU", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}
let timer = null;

async function loadRoom() {
  const res = await fetch(`/api/matches/${encodeURIComponent(id)}/room`, { credentials: "include" });
  const data = await res.json().catch(()=>null);
  if (!res.ok || !data) {
    document.getElementById("roomHead").textContent = (data && data.error) ? data.error : "Ошибка";
    return;
  }

  document.title = `${data.teamA.name} vs ${data.teamB.name} — Комната матча`;

  document.getElementById("roomHead").innerHTML = `
    <div class="row" style="justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
      <div>
        <div class="small">${esc(data.tournament.name)}</div>
        <div style="font-size:28px;font-weight:800;">${esc(data.teamA.name)} vs ${esc(data.teamB.name)}</div>
        <div class="small">Начало: ${fmt(data.scheduledAt)} • BO${data.tournament.bo}</div>
      </div>
      <div class="badge ${data.status === 'ready' ? 'accent' : ''}">${esc(data.status)}</div>
    </div>
  `;

  document.getElementById("teamsBox").innerHTML = `
    <div class="match-team-card">
      <div class="match-team-name">${data.teamA.tag ? "[" + esc(data.teamA.tag) + "] " : ""}${esc(data.teamA.name)}</div>
      <div class="small">Капитан: ${esc(data.captains?.A || "—")}</div>
    </div>
    <div class="match-team-card">
      <div class="match-team-name">${data.teamB.tag ? "[" + esc(data.teamB.tag) + "] " : ""}${esc(data.teamB.name)}</div>
      <div class="small">Капитан: ${esc(data.captains?.B || "—")}</div>
    </div>
  `;

  const veto = data.veto || {};
  const currentTurn = veto.current_turn;
  const deadline = veto.turn_deadline_at ? new Date(veto.turn_deadline_at).getTime() : null;
  const step = veto.steps && veto.steps[veto.stepIndex] ? veto.steps[veto.stepIndex] : null;

  function renderTimer() {
    if (!deadline) return "—";
    const left = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
    return `${left} сек`;
  }

  document.getElementById("turnBox").innerHTML = `
    <div><b>Текущий ход:</b> ${step ? `${step.by === "A" ? esc(data.teamA.name) : esc(data.teamB.name)} • ${step.type === "ban" ? "бан" : "пик"}` : "Veto завершён"}</div>
    <div><b>Таймер:</b> <span id="turnTimer">${renderTimer()}</span></div>
  `;

  clearInterval(timer);
  timer = setInterval(() => {
    const el = document.getElementById("turnTimer");
    if (el) el.textContent = renderTimer();
  }, 1000);

  const remaining = Array.isArray(veto.remaining) ? veto.remaining : [];
  const used = new Set();
  (veto.actions || []).forEach(a => used.add(a.map));
  const allMaps = Array.isArray(data.tournament.mapPool) ? data.tournament.mapPool : [];

  document.getElementById("mapsGrid").innerHTML = allMaps.map(map => {
    const disabled = !remaining.includes(map) || !step || data.mySide !== currentTurn || (step && step.by !== data.mySide) || data.isAdmin;
    const cls = used.has(map) ? "used" : (remaining.includes(map) ? "active" : "locked");
    return `<button class="map-tile ${cls}" ${disabled ? "disabled" : ""} onclick="doVeto('${map.replace(/'/g,"&#39;")}')">${esc(map)}</button>`;
  }).join("");

  document.getElementById("actionsLog").innerHTML = (veto.actions || []).length
    ? veto.actions.map(a => `<div>${esc(a.by)} • ${esc(a.type)} • ${esc(a.map)}</div>`).join("")
    : "Пока без действий";

  document.getElementById("serverBox").innerHTML = `
    <div><b>IP:</b> ${esc(data.serverIp || "Пока не указан")}</div>
    <div><b>Пароль:</b> ${esc(data.serverPassword || "—")}</div>
    <div style="height:8px"></div>
    ${data.connect ? `<button class="btn" onclick="copyConnect('${esc(data.connect)}')">Скопировать connect</button>` : ""}
  `;
}

async function doVeto(map) {
  const res = await fetch(`/api/matches/${encodeURIComponent(id)}/veto-action`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ map })
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) {
    if (window.showToast) showToast((data && data.error) ? data.error : "Ошибка");
    else alert((data && data.error) ? data.error : "Ошибка");
    return;
  }
  loadRoom();
}

function copyConnect(text) {
  navigator.clipboard.writeText(text || "");
  if (window.showToast) showToast("Команда подключения скопирована", "success");
}

loadRoom();
setInterval(loadRoom, 2500);
</script>
</body>
</html>
