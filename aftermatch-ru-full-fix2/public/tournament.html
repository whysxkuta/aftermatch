<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aftermatch.ru — Турнир</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div>
      <div class="nav">
        <a href="/login.html">Вход</a>
        <a href="/register.html">Регистрация</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="hero" class="card">Загрузка...</div>
    <div style="height:14px"></div>
    <div id="details" class="card">Загрузка...</div>
    <div style="height:14px"></div>
    <div id="prizes" class="card" style="display:none;"></div>
    <div style="height:14px"></div>
    <div id="teams" class="card">Загрузка...</div>
    <div style="height:14px"></div>
    <div id="roomMatches" class="card" style="display:none;"></div>
    <div style="height:14px"></div>
    <div id="adminEdit" class="card" style="display:none;"></div>
    <div style="height:14px"></div>
    <div id="bracket" class="card">Загрузка...</div>
  </div>

<script>
const q = new URLSearchParams(location.search);
const id = q.get("id");
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, type="error"){ if(window.showToast) showToast(msg, type); else alert(msg); }
function fmt(v){
  if(!v) return "—";
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return esc(v);
  return d.toLocaleString("ru-RU", {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'});
}
let DATA = null;

async function load() {
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}`, { credentials: "include" });
  const t = await res.json().catch(()=>null);
  if (!res.ok || !t) {
    document.getElementById("hero").textContent = (t && t.error) ? t.error : "Ошибка";
    return;
  }
  DATA = t;
  document.title = `${t.name} — aftermatch.ru`;

  document.getElementById("hero").innerHTML = `
    <div class="tour-page-header" style="${t.page_cover_url ? `background-image:url(${t.page_cover_url});background-size:cover;background-position:center;` : ``}">
      <div class="tour-page-overlay">
        <div class="row" style="justify-content:space-between;align-items:flex-start;gap:10px;">
          <div>
            <div class="badge">${t.card_badge}</div>
            <div style="height:12px"></div>
            <div style="font-size:34px; font-weight:800; line-height:1.15;">${esc(t.name)}</div>
            <div class="small" style="margin-top:10px; max-width:760px;">${esc(t.description || "")}</div>
          </div>
          <div id="joinBox"></div>
        </div>
      </div>
    </div>
  `;

  document.getElementById("details").innerHTML = `
    <h2>О турнире</h2>
    <div class="small">${esc(t.description || "Описание пока не заполнено.")}</div>
    <div style="height:12px"></div>
    <div class="small"><b>Формат:</b> ${esc(t.mode || "—")}</div>
    <div class="small"><b>Сетка:</b> ${esc(t.bracket_mode || "single_elim")}</div>
    <div class="small"><b>Карты:</b><br/>${(t.map_pool || []).map(m => `&nbsp;&nbsp;&nbsp;&nbsp;${esc(m)}`).join("<br/>")}</div>
    <div style="height:12px"></div>
    <div style="height:12px"></div>
    <div class="row" style="gap:10px; flex-wrap:wrap;">
      <div class="card" style="padding:12px; min-width:260px;">
        <div class="small">Чек-ин до</div>
        <div><b>${fmt(t.checkin_until)}</b></div>
      </div>
      <div class="card" style="padding:12px; min-width:260px;">
        <div class="small">Начало матчей</div>
        <div><b>${fmt(t.matches_start_at)}</b></div>
      </div>
    </div>
  `;

  if (Array.isArray(t.prizes) && t.prizes.length) {
    const box = document.getElementById("prizes");
    box.style.display = "block";
    box.innerHTML = `
      <h2>Призовые</h2>
      ${t.prizes.map(p => `
        <div class="row" style="justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);">
          <div><b>${p.place} место</b></div>
          <div class="badge accent">${esc(p.value)}</div>
        </div>
      `).join("")}
    `;
  }

  const joinBox = document.getElementById("joinBox");
  if (t.i_am_captain && t.my_team && !t.my_team_registered && !Number(t.registration_closed||0)) {
    joinBox.innerHTML = `<button class="btn primary" onclick="registerTeam()">Принять участие</button>`;
  } else if (t.i_am_captain && t.my_team_registered) {
    joinBox.innerHTML = `<div class="badge accent">Команда уже участвует</div>`;
  } else if (t.my_team && !t.i_am_captain) {
    joinBox.innerHTML = `<div class="badge">Только капитан может зарегистрировать команду</div>`;
  } else {
    joinBox.innerHTML = ``;
  }

  const teams = Array.isArray(t.teams) ? t.teams : [];

  if (Array.isArray(t.room_matches) && t.room_matches.length) {
    const roomBox = document.getElementById("roomMatches");
    roomBox.style.display = "block";
    roomBox.innerHTML = `
      <h2>Комнаты матчей</h2>
      ${t.room_matches.map(m => `
        <div class="row" style="justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:12px;">
          <div>
            <div><b>${m.teamA?.name || "TBD"} vs ${m.teamB?.name || "TBD"}</b></div>
            <div class="small">Раунд ${m.round} • ${fmt(m.scheduledAt)}</div>
          </div>
          <a class="btn primary" href="/match-room.html?id=${encodeURIComponent(m.matchId)}">Комната матча</a>
        </div>
      `).join("")}
    `;
  }

  document.getElementById("teams").innerHTML = `
    <h2>Команды</h2>
    ${teams.length ? teams.map(team => `
      <div class="row" style="justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:12px;">
        <div class="row" style="align-items:center;gap:12px;">
          <div class="team-avatar-sm ${team.avatar_url ? `` : `steam-default-avatar`}" style="${team.avatar_url ? `background-image:url(${team.avatar_url});background-size:cover;background-position:center;` : ``}"></div>
          <div>
            <div><b>${team.tag ? "[" + esc(team.tag) + "] " : ""}${esc(team.name)}</b></div>
            <div class="small">${esc(team.description || "")}</div>
            <div class="small">Игроков: ${Number(team.players_count || 0)}</div>
          </div>
        </div>
        <div class="row" style="gap:8px;align-items:center;">
          <div class="small">${fmt(team.registered_at)}</div>
          ${t.is_admin ? `<button class="btn" onclick="removeTeam('${team.id}')">Исключить</button>` : ``}
        </div>
      </div>
    `).join("") : `<div class="small">Пока нет зарегистрированных команд.</div>`}
  `;

  renderAdminEditor(t);
  renderBracket(t);
}

function renderAdminEditor(t){
  const box = document.getElementById("adminEdit");
  if(!t.is_admin){ box.style.display="none"; return; }
  box.style.display = "block";
  box.innerHTML = `
    <h2>Редактирование турнира</h2>
    <div class="row">
      <div class="col"><div class="small">Название</div><input id="ed_name" value="${esc(t.name)}" /></div>
      <div class="col"><div class="small">Описание</div><input id="ed_desc" value="${esc(t.description||"")}" /></div>
    </div>
    <div style="height:10px"></div>
    <div class="row">
      <div class="col"><div class="small">Шапка для главной</div><input id="ed_cover" value="${esc(t.cover_url||"")}" /></div>
      <div class="col"><div class="small">Шапка для страницы турнира</div><input id="ed_page_cover" value="${esc(t.page_cover_url||"")}" /></div>
    </div>
    <div style="height:10px"></div>
    <div class="row">
      <div class="col"><div class="small">Призовые места</div>
        <select id="ed_prize_places" onchange="toggleAdminPrizeFields()">
          <option value="0" ${Number(t.prize_places||0)===0?'selected':''}>Без призовых</option>
          <option value="1" ${Number(t.prize_places||0)===1?'selected':''}>1 место</option>
          <option value="3" ${Number(t.prize_places||0)===3?'selected':''}>1-3 места</option>
        </select>
      </div>
      <div class="col"><div class="small">Лимит команд (0 = выключен)</div><input id="ed_max_teams" type="number" min="0" value="${Number(t.max_teams||0)}" /></div>
      <div class="col"><div class="small">Чек-ин до</div><input id="ed_checkin_until" type="datetime-local" value="${toDatetimeLocal(t.checkin_until)}" /></div>
      <div class="col"><div class="small">Начало матчей</div><input id="ed_matches_start_at" type="datetime-local" value="${toDatetimeLocal(t.matches_start_at)}" /></div>
    </div>
    <div style="height:10px"></div>
    <div class="row" id="adminPrizeFields">
      <div class="col"><div class="small">1 место</div><input id="ed_prize_1" value="${esc(t.prize_1||"")}" /></div>
      <div class="col"><div class="small">2 место</div><input id="ed_prize_2" value="${esc(t.prize_2||"")}" /></div>
      <div class="col"><div class="small">3 место</div><input id="ed_prize_3" value="${esc(t.prize_3||"")}" /></div>
    </div>
    <div style="height:10px"></div>
    <label class="small"><input id="ed_early_checkin_open" type="checkbox" ${Number(t.early_checkin_open||0)?'checked':''}/> Открыть ранний чек-ин</label>
    <label class="small" style="margin-left:16px;"><input id="ed_registration_closed" type="checkbox" ${Number(t.registration_closed||0)?'checked':''}/> Закрыть регистрацию на турнир</label>
    <div style="height:12px"></div>
    <div class="row">
      <button class="btn primary" onclick="saveTournament()">Сохранить турнир</button>
      <button class="btn" onclick="generateBracket()">Сгенерировать сетку</button>
    </div>
  `;
  toggleAdminPrizeFields();
}

function renderBracket(t){
  const box = document.getElementById("bracket");
  const matches = Array.isArray(t.bracket_matches) ? t.bracket_matches : [];
  box.innerHTML = `<h2>Сетка турнира</h2>` + (
    matches.length ? groupBracket(matches) : `<div class="small">Сетка пока не создана.</div>`
  );
}

function groupBracket(matches){
  const rounds = {};
  matches.forEach(m => { (rounds[m.round_number] ||= []).push(m); });
  return `<div class="bracket-grid">` + Object.keys(rounds).sort((a,b)=>Number(a)-Number(b)).map(r => `
    <div class="bracket-round">
      <div class="bracket-round-title">Раунд ${r}</div>
      ${rounds[r].map(m => `
        <div class="card bracket-match-card">
          <div class="small">Матч ${m.slot_number}</div>
          <div style="height:8px"></div>
          ${renderMatchEditor(m)}
        </div>
      `).join("")}
    </div>
  `).join("") + `</div>`;
}

function renderMatchEditor(m){
  const options = (DATA.teams||[]).map(t => `<option value="${t.id}" ${m.team_a_id===t.id||m.team_b_id===t.id?'':' '}>${esc((t.tag?`[${t.tag}] `:"")+t.name)}</option>`).join("");
  return `
    <div class="small">Команда A</div>
    <select id="m_a_${m.id}">
      <option value="">—</option>
      ${(DATA.teams||[]).map(t => `<option value="${t.id}" ${m.team_a_id===t.id?'selected':''}>${esc((t.tag?`[${t.tag}] `:"")+t.name)}</option>`).join("")}
    </select>
    <div style="height:8px"></div>
    <div class="small">Команда B</div>
    <select id="m_b_${m.id}">
      <option value="">—</option>
      ${(DATA.teams||[]).map(t => `<option value="${t.id}" ${m.team_b_id===t.id?'selected':''}>${esc((t.tag?`[${t.tag}] `:"")+t.name)}</option>`).join("")}
    </select>
    <div style="height:8px"></div>
    <div class="small">Время матча</div>
    <input id="m_time_${m.id}" type="datetime-local" value="${toDatetimeLocal(m.scheduled_at)}" />
    <div style="height:8px"></div>
    <div class="small">Сервер: IP</div>
    <input id="m_ip_${m.id}" value="${esc(m.server_ip||"")}" placeholder="1.2.3.4:27015" />
    <div style="height:8px"></div>
    <div class="small">Пароль сервера</div>
    <input id="m_pass_${m.id}" value="${esc(m.server_password||"")}" placeholder="password" />
    <div style="height:8px"></div>
    <div class="row">
      <div class="col"><div class="small">Счёт A</div><input id="m_sa_${m.id}" type="number" value="${m.score_a ?? ""}" /></div>
      <div class="col"><div class="small">Счёт B</div><input id="m_sb_${m.id}" type="number" value="${m.score_b ?? ""}" /></div>
    </div>
    <div style="height:8px"></div>
    <div class="small">Победитель</div>
    <select id="m_win_${m.id}">
      <option value="">—</option>
      ${m.teamA ? `<option value="${m.teamA.id}" ${m.winner_team_id===m.teamA.id?'selected':''}>${esc(m.teamA.name)}</option>`:''}
      ${m.teamB ? `<option value="${m.teamB.id}" ${m.winner_team_id===m.teamB.id?'selected':''}>${esc(m.teamB.name)}</option>`:''}
    </select>
    <div style="height:10px"></div>
    ${DATA.is_admin ? `<button class="btn primary" onclick="saveBracketMatch('${m.id}')">Сохранить матч</button>` : ``}
    ${m.winner ? `<div class="small" style="margin-top:8px;">Победитель: <b>${esc(m.winner.name)}</b></div>` : ``}
  `;
}

function toDatetimeLocal(v){
  if(!v) return "";
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return "";
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function toggleAdminPrizeFields(){
  const places = Number(document.getElementById("ed_prize_places")?.value || 0);
  const row = document.getElementById("adminPrizeFields");
  if(!row) return;
  row.style.display = places > 0 ? "flex" : "none";
  row.children[1].style.display = places === 3 ? "" : "none";
  row.children[2].style.display = places === 3 ? "" : "none";
}

async function saveTournament(){
  const payload = {
    name: document.getElementById("ed_name").value.trim(),
    description: document.getElementById("ed_desc").value.trim(),
    cover_url: document.getElementById("ed_cover").value.trim(),
    page_cover_url: document.getElementById("ed_page_cover").value.trim(),
    prize_places: Number(document.getElementById("ed_prize_places").value || 0),
    prize_1: document.getElementById("ed_prize_1").value.trim(),
    prize_2: document.getElementById("ed_prize_2").value.trim(),
    prize_3: document.getElementById("ed_prize_3").value.trim(),
    max_teams: Number(document.getElementById("ed_max_teams").value || 0),
    early_checkin_open: document.getElementById("ed_early_checkin_open").checked,
    registration_closed: document.getElementById("ed_registration_closed").checked,
    checkin_until: document.getElementById("ed_checkin_until").value,
    matches_start_at: document.getElementById("ed_matches_start_at").value
  };
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}`, {
    method:"PATCH", headers:{"Content-Type":"application/json"}, credentials:"include", body:JSON.stringify(payload)
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok) return toast((data&&data.error)||"Ошибка");
  toast("Турнир сохранён","success");
  load();
}

async function generateBracket(){
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}/bracket/generate`, {method:"POST", credentials:"include"});
  const data = await res.json().catch(()=>null);
  if(!res.ok) return toast((data&&data.error)||"Ошибка");
  toast("Сетка создана","success");
  load();
}

async function saveBracketMatch(matchId){
  const payload = {
    team_a_id: document.getElementById(`m_a_${matchId}`).value || null,
    team_b_id: document.getElementById(`m_b_${matchId}`).value || null,
    scheduled_at: document.getElementById(`m_time_${matchId}`).value || null,
    server_ip: document.getElementById(`m_ip_${matchId}`).value.trim() || null,
    server_password: document.getElementById(`m_pass_${matchId}`).value.trim() || null,
    score_a: document.getElementById(`m_sa_${matchId}`).value,
    score_b: document.getElementById(`m_sb_${matchId}`).value,
    winner_team_id: document.getElementById(`m_win_${matchId}`).value || null
  };
  const res = await fetch(`/api/bracket-matches/${encodeURIComponent(matchId)}`, {
    method:"PATCH", headers:{"Content-Type":"application/json"}, credentials:"include", body:JSON.stringify(payload)
  });
  const data = await res.json().catch(()=>null);
  if(!res.ok) return toast((data&&data.error)||"Ошибка");
  toast("Матч сохранён","success");
  load();
}

async function registerTeam() {
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}/register-team`, { method: "POST", credentials: "include" });
  const data = await res.json().catch(()=>null);
  if (!res.ok) return toast((data && data.error) ? data.error : "Ошибка");
  toast("Команда зарегистрирована","success");
  load();
}

async function removeTeam(teamId) {
  if (!confirm("Исключить команду из турнира?")) return;
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}/remove-team`, {
    method: "POST", headers: {"Content-Type":"application/json"}, credentials: "include", body: JSON.stringify({ teamId })
  });
  const data = await res.json().catch(()=>null);
  if (!res.ok) return toast((data && data.error) ? data.error : "Ошибка");
  toast("Команда исключена","success");
  load();
}

load();
</script>
</body>
</html>
