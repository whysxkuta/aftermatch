<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aftermatch.ru — Турнир</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><div><div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div></div></div>
      <div class="nav"></div>
    </div>
  </div>

  <div class="container">
    <div id="hero" class="card">Загрузка...</div>
    <div style="height:14px"></div>
    <div class="card tournament-hub-nav" id="hubNav">Загрузка...</div>
  </div>

<script>
const q = new URLSearchParams(location.search);
const id = q.get("id");
function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function load() {
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}`, { credentials: "include" });
  const t = await res.json().catch(()=>null);
  if (!res.ok || !t) {
    document.getElementById("hero").textContent = (t && t.error) ? t.error : "Ошибка";
    document.getElementById("hubNav").style.display = "none";
    return;
  }

  document.title = `${t.name} — aftermatch.ru`;

  document.getElementById("hero").innerHTML = `
    <div class="tour-page-header" style="${t.page_cover_url ? `background-image:url(${t.page_cover_url});background-size:cover;background-position:center;` : ``}">
      <div class="tour-page-overlay">
        <div class="badge">${t.card_badge}</div>
        <div style="height:14px"></div>
        <div style="font-size:34px; font-weight:800; line-height:1.15;">${esc(t.name)}</div>
        <div class="small" style="margin-top:10px; max-width:760px;">${esc(t.description || "")}</div>
      </div>
    </div>
  `;

  document.getElementById("hubNav").innerHTML = `
    <div class="tournament-hub-buttons">
      <a class="nav-btn-link tournament-hub-btn" href="/tournament-bracket.html?id=${encodeURIComponent(id)}">Сетка</a>
      <a class="nav-btn-link tournament-hub-btn" href="/tournament-rules.html?id=${encodeURIComponent(id)}">Правила</a>
      ${t.is_admin ? `<a class="nav-btn-link tournament-hub-btn tournament-settings-btn" href="/tournament-settings.html?id=${encodeURIComponent(id)}"><img src="/src/Settings.ico" alt="" class="settings-icon" /></a>` : ``}
    </div>
  `;
}
load();
</script>
</body>
</html>
