<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>aftermatch.ru — Турнир</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div>
          <div class="brand-title"><a href="/" style="color:inherit;text-decoration:none;">aftermatch.ru</a></div>
        </div>
      </div>
      <div class="nav">
        <a href="/">Главная</a>
        <a href="/login.html">Вход</a>
        <a href="/register.html">Регистрация</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="card" class="card">Загрузка...</div>
    <div style="height:14px"></div>

    <div class="card">
      <div class="row" style="align-items:center; justify-content:space-between;">
        <h2>Матчи</h2>
      </div>
      <div id="matches" class="small">Пока модуль в разработке: матчи будут внутри турнира.</div>
    </div>
  </div>

<script>
const q = new URLSearchParams(location.search);
const id = q.get("id");

async function load() {
  const res = await fetch(`/api/tournaments/${encodeURIComponent(id)}`, { credentials: "include" });
  const t = await res.json();
  if (!res.ok) { document.getElementById("card").textContent = t.error || "Ошибка"; return; }
  document.getElementById("card").innerHTML = `
    <div style="font-size:22px;"><b>${t.name}</b></div>
    <div class="small" style="margin-top:8px;">${t.description || ""}</div>
    <div style="height:10px"></div>
    ${t.prize ? `<div class="badge accent">${t.prize}</div>` : ""}
  `;
}
load();
</script>
</body>
</html>
